source      = "github"
source_url  = "https://github.com/deepinsight/insightface/releases/download/v0.7/buffalo_l.zip"
# buffalo_l e' uno zip che include det_10g (RetinaFace, ~17MB), w600k_r50
# (ArcFace, ~170MB), e altri modelli InsightFace (genderage, 2d106det,
# 1k3d68). Per Metnos ne usiamo solo det_10g + w600k_r50.
files = [
  { name = "buffalo_l.zip", local = "/opt/metnos/models/face/buffalo_l.zip", sha256 = "80ffe37d8a5940d59a7384c201a2a38d4741f2f3c51eef46ebb28218a7b0ca2f" },
  # Estratti dallo zip post-download (sha256 verificati 2026-05-04):
  { name = "det_10g.onnx", local = "/opt/metnos/models/face/det_10g.onnx", sha256 = "5838f7fe053675b1c7a08b633df49e7af5495cee0493c7dcf6697200b85b5b91", extract_from = "buffalo_l.zip", member = "det_10g.onnx" },
  { name = "w600k_r50.onnx", local = "/opt/metnos/models/face/w600k_r50.onnx", sha256 = "4c06341c33c2ca1f86781dab0e829f88ad5b64be9fba56e56bc9ebdefc619e43", extract_from = "buffalo_l.zip", member = "w600k_r50.onnx" },
]
local_path  = "/opt/metnos/models/face"
size_mb     = 280
embedding_dim = 512
required_for = ["face detection in immagini (executor TBD)", "indici volti per ricerca similarita' (executor TBD)"]
notes       = "L'indice volti puo' essere replicato/sincronizzato fra le macchine personali del maintainer (sync fra nodi e' topic futuro). NESSUNA restrizione 'solo locale' codificata qui."

# ── Script eseguibili (symlink in /usr/local/bin) ─────────────────────

[[scripts.entry]]
name        = "metnos-cli"
src         = "/opt/metnos/scripts/metnos-cli"
dest        = "/usr/local/bin/metnos-cli"
mode        = "0755"
needs_sudo  = true
notes       = "CLI utility (Strato 3 ADR 0089): gestione credenziali da terminale (`metnos-cli credentials add cifs_<host>`). Symlink, non copia: aggiornamenti automatici col repo."

# ── Servizi systemd ───────────────────────────────────────────────────

[[services.entry]]
name            = "metnos-http"
type            = "systemd-user"
unit_file_local = "/opt/metnos/install/units/metnos-http.service"
unit_file_dest  = "~/.config/systemd/user/metnos-http.service"
description     = "HTTP API + admin dashboard (porta 8770). Co-host scheduler v2 (ADR 0112), persons registry (ADR 0113), unified image index (ADR 0117)."
enabled_at_install = true
needs_sudo      = false
needs_linger    = true
notes           = "User unit (8/5/2026, ADR 0117 prep): migrato da system→user per consentire systemd-run --user del build_orchestrator (ADR 0093). Richiede `loginctl enable-linger <user>` per startup auto al boot anche senza login."

[[services.entry]]
name            = "metnos-i18n-translator"
type            = "systemd-timer"
unit_file_local = "/opt/metnos/install/units/metnos-i18n-translator.service"
unit_file_dest  = "/etc/systemd/system/metnos-i18n-translator.service"
timer_file_local = "/opt/metnos/install/units/metnos-i18n-translator.timer"
timer_file_dest  = "/etc/systemd/system/metnos-i18n-translator.timer"
description     = "Traduce lazy le stringhe i18n non ancora tradotte (timer ogni 5min)"
enabled_at_install = true
needs_sudo      = true

[[services.entry]]
name            = "metnos-telegram-daemon"
type            = "systemd-user"
unit_file_local = "/opt/metnos/systemd/metnos-telegram-daemon.service"
unit_file_dest  = "~/.config/systemd/user/metnos-telegram-daemon.service"
description     = "Daemon canale Telegram (poll, run_turn, send)"
enabled_at_install = false                  # solo se token Telegram configurato
needs_sudo      = false
notes           = "User unit (systemctl --user). Attivato manualmente dopo `pair-channel` di Telegram."

# metnos-scheduler.service ELIMINATA (ADR 0112, 8/5/2026 mattina): scheduler v2
# asyncio-native co-host nel server HTTP, no piu' processo standalone. Vedi
# §10.6.39 the design guide + decisions/0112-scheduler-v2-asyncio-cohost.md.

[[services.entry]]
name            = "metnos-llm-mid"
type            = "systemd-user"
unit_file_local = "/opt/metnos/install/units/metnos-llm-mid.service"
unit_file_dest  = "~/.config/systemd/user/metnos-llm-mid.service"
description     = "LLM mid/wise tier — llama-server Gemma 4 26B (porta 8080), 65K ctx, speculative decoding con draft E2B."
enabled_at_install = true
needs_sudo      = false
needs_linger    = true
notes           = "ADR 0112+ tier locale principale. Throughput ~130 tok/s post-warmup (acc 0.97). Vedi runtime/llm_router.py per il routing fast/middle/wise. Cmd reference: llama-server -m gemma-4-26B-A4B-it-UD-Q4_K_M.gguf -ngl 999 -fa on --jinja --reasoning-budget 1024 --host 0.0.0.0 --port 8080 --cache-prompt -c 65536 --cache-type-k f16 --cache-type-v f16 --parallel 2 --cont-batching -md gemma-4-E2B-it-Q4_K_M.gguf --spec-draft-ngl 999 --spec-draft-n-max 4 --spec-draft-p-min 0.75"

# metnos-vlm.service ELIMINATA (task D VLM-uptime, 25/6/2026): il VLM non e' piu'
# un service systemd persistente ma LAZY-START on-demand (auto-stop-idle) via
# `scripts/vlm_server.sh`, con owner CENTRALE `runtime/virt.ensure_vlm_up` — ogni
# consumatore lo condivide, non e' un effetto collaterale di un executor. Il file
# unit non e' mai esistito in install/units/ (l'entry restava un WARN+skip).
# Config opzionale (off by default) in ~/.config/metnos/vlm_tiers.toml. Vedi
# decisions/0117 + project-virt-model-virtualization.

