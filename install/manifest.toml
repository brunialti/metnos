# /opt/metnos/install/manifest.toml
#
# Manifest centrale di installazione di Metnos.
#
# E' la "single source of truth" per riprodurre l'ambiente Metnos su un nodo
# nuovo: pacchetti Python, pacchetti di sistema, modelli ML, servizi systemd,
# directory, template di config, secret rigenerabili e servizi esterni.
#
# Lo script `install/setup.sh` (scaffold) lo legge e applica passi idempotenti.
# Lo script `install/download_models.sh` (scaffold) usa la sezione [models]
# per scaricare i blob ML e verificarli via sha256.
#
# Nodo di destinazione: una macchina Linux Debian/Ubuntu derivata, con
# Python >= 3.12, accesso a Internet per il primo download dei modelli e
# dei pacchetti, e abbastanza spazio per ~1 GB di blob (modelli + venv).
#
# IMPORTANTE: questo manifest NON nasconde decisioni nel codice. Tutto cio'
# che e' "componente da installare" passa di qui. Se aggiungi una dipendenza,
# un servizio o un modello, dichiaralo qui prima.

# ── Metadati globali ──────────────────────────────────────────────

[meta]
name        = "metnos"
version     = "1.1"
description = "Metnos — assistente personale self-hosted (microarchitettura a executor sintetizzati al volo via synt multistage; runtime ReAct con planner LLM locale + frontier come fallback). Canale primario Telegram, lingua principale italiano."
maintainer  = "the owner"
process_name = "myclaw"
domain      = "metnos.com"
generated_at = "2026-05-04T17:00:00Z"
manifest_schema_version = 1

# ── Runtime di sistema ─────────────────────────────────────────────

[runtime]
python_min      = "3.12"
working_dir     = "/opt/metnos"
data_dir        = "~/.local/share/metnos"
state_dir       = "~/.local/state/metnos"
config_dir      = "~/.config/metnos"
log_dir         = "~/.local/state/metnos"     # log via journald + locations.jsonl
synthesized_executors_dir = "~/.local/share/metnos/executors"
history_dir     = "~/.local/share/metnos/_history"
turn_blob_dir   = "~/.local/share/metnos/_history/{turn_id}/blob"
suprastructure_path = "/opt/suprastructure/src"  # PYTHONPATH per onnx_embedding e i18n
giorgio2_models_path = "/opt/giorgio2/models"    # share modelli con giorgio2 (read-only)

# ── Pacchetti Python ────────────────────────────────────────────────

[runtime.python_packages]
# Required: presupposti del runtime di Metnos. Senza questi, agent_runtime
# o executor non partono.
required = [
    "aiohttp>=3.13",                    # HTTP server e client (admin, agent_server, photon, etc.)
    "cryptography>=41",                 # Ed25519 sign + Fernet (sign.py, credentials.py)
    "Jinja2>=3",                        # http_render (admin dashboard, mirror)
    "numpy>=2.0",                       # embedding service, prefilter, executor
    "onnxruntime>=1.20",                # MiniLM (suprastructure) + SigLIP scene + ArcFace face
    "tokenizers>=0.20",                 # tokenizer HF Rust per MiniLM e SigLIP
    "Pillow>=10",                       # image I/O (read_files_ocr esistente; pipeline immagini nuova)
]

# Optional: arricchiscono executor specifici. Senza, l'executor degrada o
# segna fail con messaggio chiaro (es. read_urls_pdf prova pypdf > pdfminer).
optional = [
    "pypdf>=4",                         # read_urls_pdf parser preferito
    "pdfminer.six>=2024",               # read_urls_pdf fallback
    "openpyxl>=3.1",                    # read_files_xlsx
    "tomli>=2; python_version<'3.11'",  # tomllib fallback per Python < 3.11
]

# Dev-only: test runner, lint, debug. NON installati in produzione.
dev = [
    "pytest>=8",
]

# ── Pacchetti di sistema ─────────────────────────────────────────────

[system_packages]
# Distribuzione di riferimento: Debian/Ubuntu stable. Per Arch/Fedora,
# l'installazione manuale e' ovvia (i nomi pacchetto sono simili).
debian = [
    "python3.12",                       # interprete (>= 3.12)
    "python3.12-venv",                  # venv per il runtime
    "python3-pip",                      # installazione pacchetti pip
    "tesseract-ocr",                    # read_files_ocr (engine)
    "tesseract-ocr-ita",                # OCR italiano
    "tesseract-ocr-eng",                # OCR inglese
    "poppler-utils",                    # pdftoppm per OCR su PDF
    "imagemagick",                      # convert (test fixtures, OCR utility)
    "curl",                             # download modelli, mail check, debug
    "ca-certificates",                  # TLS verify
    "libgomp1",                         # runtime OpenMP per onnxruntime
]

# Pacchetti opzionali: aggiungono capacita' periferiche.
debian_optional = [
    "tesseract-ocr-fra",                # OCR francese (lingua secondaria)
    "tesseract-ocr-deu",                # OCR tedesco
    "ffmpeg",                           # futuri executor audio/video
    "exiftool",                         # alternativa a PIL.ExifTags per metadata estesi
]

# ── Modelli ML ────────────────────────────────────────────────────────

# Tutti i modelli sono ONNX (no pytorch nel runtime). I blob sono scaricati
# da install/download_models.sh con verifica sha256 al primo run. Il flag
# `required_for` enumera gli executor che dipendono dal modello: se il
# modello manca, quegli executor risultano `unavailable` al loader.

# ── LLM tier locale (llama.cpp servito) ────────────────────────────
# 8/5/2026: switch da Ollama a llama.cpp build-vulkan per perf su Strix Halo.
# Modelli scaricati manualmente da Roberto in /home/user/models/.
# Future re-installazione: documenta il download manuale + verifica sha256.

[[models.entry]]
name        = "llm_mid_gemma4_26b"
purpose     = "LLM tier middle/wise locale per PLANNER + synt + describe + intent + vaglio. Servito da metnos-llm-mid.service su :8080."
source      = "manual_download"
local_path  = "/home/user/models/gemma-4-26B-A4B-it-UD-Q4_K_M.gguf"
size_mb     = 15000
required_for = ["agent_runtime PLANNER", "synt 5-stage", "describe_entries", "vaglio_llm", "intent_extractor"]
notes       = "Gemma 4 26B quantizzato Q4_K_M. Throughput ~130 tok/s post-warmup con speculative decoding (draft E2B) e ctx 65K. Acc 0.97 sui prompt strutturati."

[[models.entry]]
name        = "llm_draft_gemma4_e2b"
purpose     = "Draft model per speculative decoding del mid tier. Predice token che il modello principale verifica."
source      = "manual_download"
local_path  = "/home/user/models/gemma-4-E2B-it-Q4_K_M.gguf"
size_mb     = 1600
required_for = ["llm_mid_gemma4_26b speculative decoding"]
notes       = "Servito inline al mid tier via flag --md di llama-server. Acceptance rate ~0.97 su prompt strutturati Metnos."

[[models.entry]]
name        = "vlm_qwen3vl_2b"
purpose     = "Vision-Language Model per unified image enrichment (ADR 0117). Genera description+keywords+location+activity da ogni foto al build time."
source      = "manual_download"
local_path  = "/home/user/models/Qwen3VL-2B-Instruct-Q4_K_M.gguf"
mmproj_local = "/home/user/models/mmproj-Qwen3VL-2B-Instruct-F16.gguf"
size_mb     = 3000
required_for = ["create_images_indices unified builder (ADR 0117)", "find_images query content/location"]
notes       = "Servito su :8081 via scripts/vlm_server.sh (avvio lazy on-demand da create_images_indices, auto-stop 10 min idle: nessuna unit systemd). Modello/endpoint virtualizzati in ~/.config/metnos/vlm_tiers.toml (virt.get_vlm). mmproj = proiettore vision→text per la modalita' multimodale di llama-server. ~1-2s/foto su Strix Halo Vulkan."

[[models.entry]]
name        = "embedding_text_minilm"
purpose     = "embedding semantico testuale (multilingue, 384 dim, MiniLM-L12-v2). Condiviso con suprastructure e giorgio2."
source      = "huggingface"
source_url  = "https://huggingface.co/sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
files = [
  { name = "model.onnx", local = "/opt/giorgio2/models/onnx/model.onnx", sha256 = "<existing-shared>" },
  { name = "tokenizer.json", local = "/opt/giorgio2/models/onnx/tokenizer.json", sha256 = "<existing-shared>" },
  { name = "giorgio_meta.json", local = "/opt/giorgio2/models/onnx/giorgio_meta.json", sha256 = "<existing-shared>" },
]
local_path  = "/opt/giorgio2/models/onnx"
size_mb     = 130
required_for = ["prefilter (rank_with_intent)", "introvertiva", "i18n_translator (similarita' suggerimenti)"]
notes       = "Condiviso con giorgio2: NON ricopiare. Il path e' assunto presente sul nodo (mount /opt/giorgio2 oppure copia locale)."

[[models.entry]]
name        = "embedding_image_siglip"
purpose     = "scene-concept search (CLIP-style multilingue: text-image cross-modal embedding). Quantizzato 8-bit per cpu inference veloce."
source      = "huggingface"
source_url  = "https://huggingface.co/Xenova/siglip-base-patch16-224"
# La pipeline usa due ONNX separati: text_model (codifica query testuale) e
# vision_model (codifica immagini). Il "model.onnx" combinato esiste ma e'
# meno pratico per i workflow asimmetrici (1 query : N immagini).
# sha256 verificati al download del 2026-05-04.
files = [
  { name = "onnx/text_model_quantized.onnx", local = "/opt/metnos/models/siglip/text_model_quantized.onnx", sha256 = "ad0329b1f35acc66d8953ff2559ce358da8eb0a7011794cf951523d63a4dbce2", url_path = "onnx/text_model_quantized.onnx" },
  { name = "onnx/vision_model_quantized.onnx", local = "/opt/metnos/models/siglip/vision_model_quantized.onnx", sha256 = "ef14a954f3d57e1806666432bd9785004c1dc27100aa260eee0cb0f10a5de058", url_path = "onnx/vision_model_quantized.onnx" },
  { name = "tokenizer.json", local = "/opt/metnos/models/siglip/tokenizer.json", sha256 = "4a17c975210be5ab4c36b47d8dae4eefb866dbfb1e676e394aad85dc30a3ae08", url_path = "tokenizer.json" },
  { name = "tokenizer_config.json", local = "/opt/metnos/models/siglip/tokenizer_config.json", sha256 = "9a38d3c6b5e26fe5dcc607eda95e38d78d30d9291835bb9e8116e8174c1d4ba2", url_path = "tokenizer_config.json" },
  { name = "preprocessor_config.json", local = "/opt/metnos/models/siglip/preprocessor_config.json", sha256 = "21ee046a8a52a65e5f9c177bf840bfb39ea66c9c54cf2760630efd58e0a3ec80", url_path = "preprocessor_config.json" },
  { name = "config.json", local = "/opt/metnos/models/siglip/config.json", sha256 = "e6de71291f181b0b81adc93098787bb4597a79dc18f59737feda8f41671fb6a2", url_path = "config.json" },
  { name = "special_tokens_map.json", local = "/opt/metnos/models/siglip/special_tokens_map.json", sha256 = "22f82d1c19654c9552ff1368c2c236ebb34f457dbdbc7510d304cebfeb96f3bf", url_path = "special_tokens_map.json" },
  { name = "spiece.model", local = "/opt/metnos/models/siglip/spiece.model", sha256 = "1e5036bed065526c3c212dfbe288752391797c4bb1a284aa18c9a0b23fcaf8ec", url_path = "spiece.model" },
]
local_path  = "/opt/metnos/models/siglip"
size_mb     = 210
embedding_dim = 768
image_size  = 224
required_for = ["scene-concept search (executor TBD: naming in discussione)", "indici immagini per dedupe semantico"]
notes       = "Quantizzati int8 a ~210MB totali (text 110MB + vision 100MB). La versione FP32 (~810MB) sta sullo stesso repo se serve qualita' massima. Nota: l'utente aveva indicato '80MB' che riferisce al modello combinato compresso; in pratica i due modelli quantizzati separati sono il preset ergonomico."

[[models.entry]]
