purpose     = "web search self-hostato (executor di ricerca web futuri)."
optional    = true
notes       = "Esiste nella seed pool ma non legato a executor in produzione al 4/5/2026."

# ── Multi-nodo (sync fra macchine personali) ─────────────────────────

[multi_node]
# Roberto ha vari server personali in piu' location (LAN domestica `.33`,
# laptop, nodi remoti). Il manifest deve essere replicabile su qualsiasi di
# essi. Il sync di stato (credenziali, cookies, indici, history) NON e' oggi
# automatico: e' un topic futuro. Qui non codifichiamo paletti che lo
# blocchino. In particolare:
#
# - Models e' sicuro replicarli (blob deterministici, sha256 verificabile).
# - L'indice volti (face) puo' essere replicato/sincronizzato fra nodi
#   personali del maintainer.
# - Credenziali e cookies (~/.config/metnos/credentials, ~/.config/metnos/cookies)
#   restano per-nodo finche' non avremo un sync esplicito.
# - History e turns rimangono per-nodo (audit per turno, niente merge automatico).
node_role          = "primary"          # primary | replica | client
sync_strategy      = "manual"           # manual | rsync | tba (futuro)
shareable_paths    = [
    "/opt/metnos/models/siglip",
    "/opt/metnos/models/face",
]
per_node_paths     = [
    "~/.config/metnos/credentials",
    "~/.config/metnos/cookies",
    "~/.local/state/metnos",
    "~/.local/share/metnos/_history",
    "~/.local/share/metnos/turns",
]
notes = "Topic futuro: sync esplicito fra nodi (rsync o protocol custom). Oggi placeholder; nessuna assunzione di lock per-nodo."

# ── Environment variables ─────────────────────────────────────────────
# Tutte le env var che metnos-* services ed executor leggono. Setup.sh
# le iniettera' nelle unit file via Environment=.

[env_vars]
# Test isolation (8/5/2026, ADR 0117 prep)
METNOS_USER_DATA = { default = "~/.local/share/metnos", purpose = "override storage utente. I test setteno a tmp_path per isolation." }
METNOS_INDEX_ROOT = { default = "${METNOS_USER_DATA}/index", purpose = "override storage indici. Test isolano qui." }
METNOS_DRY_RUN = { default = "0", purpose = "1 = executor write short-circuitano (no side effects). Per E2E test." }
# Scheduler v2 (ADR 0112)
METNOS_SCHEDULER_V2_DB = { default = "~/.local/state/metnos/scheduler_v2.sqlite", purpose = "Override DB scheduler v2. Per test." }
# Anti-loop (ADR 0114 cap)
METNOS_CAP_MAX_PER_TURN = { default = "3", purpose = "Cap chiamate stesso tool non-action per turno. Range 2-10 ragionevole." }
# Synth admission (ADR 0114)
LLM_VERIFY_MODELS = { default = "", purpose = "Lista modelli (CSV) per multi-model consensus stage 6 verifier. Vuoto = single model." }
METNOS_SYNT_STAGE6_DISABLED = { default = "0", purpose = "1 = disabilita verifier semantico stage 6. Per fast iteration synth." }
# HTTP cache (ADR 0105)
METNOS_HTTP_CACHE_TTL_S = { default = "900", purpose = "TTL cache HTTP disco per crawler/find_urls. 0 = disabilita." }
# Async tasks
METNOS_HTTP_DISABLE_BUILD_TASKS = { default = "0", purpose = "1 = disabilita build_dispatcher/sweeper/healthcheck (per test)." }
# Prompt language (ADR 0092)
METNOS_LANG = { default = "it", purpose = "Lingua primaria per prompt e messaggi user-facing. Codici ISO 639-1." }
# VLM endpoint (ADR 0117)
METNOS_VLM_URL = { default = "http://127.0.0.1:8081", purpose = "Endpoint llama-server VLM (modello config-driven via vlm_tiers.toml). Build unified image index lo invoca; lazy-start via virt.ensure_vlm_up." }
# LLM mid endpoint (ADR 0112+)
METNOS_LLM_MID_URL = { default = "http://127.0.0.1:8080", purpose = "Endpoint llama-server mid tier (Gemma 4 26B)." }

