# Manifest dell'executor `send_messages` — Metnos v1.1

manifest_format = "1.0"

name        = "send_messages"
version     = "0.4.0"
author      = "Roberto Brunialti"
affinity    = ["send", "invia", "spedisci", "mail", "email", "mandare", "rispondere", "reply", "telegram", "messaggio", "manda a", "scrivi a"]
revertible  = false
lifecycle   = "active"
# SMTP (Migadu) puo' avere TLS handshake lento + 3 retry sul connect
# (bug live 14/5/2026 SSL handshake timeout): 30s default insufficiente.
timeout_s   = 90

[description]
it = "SCOPO: invia messaggi mail o Telegram (vettoriale). PATTERN: send_messages(to_user='lucia' o '${RUNTIME:actor}' per «inviami/mandami», via_channel='telegram'|'email', messages=[{body='t'}]). NON: omettere to_user; leggere -> read_messages. OUT: ok/results."
en = "SCOPO: send mail or Telegram messages (vectorial). PATTERN: send_messages(to_user='lucia' or '${RUNTIME:actor}' for «send me», via_channel='telegram'|'email', messages=[{body='t'}]). NON: omit to_user; read -> read_messages. OUT: ok/results."

[code]
files  = ["send_messages.py"]
digest = "sha256:400059d1f141bd5b63afc93c5d5f8660fa3f730b67f8cccbf4e844fd53f5cb31"

[args]
type     = "object"
required = ["messages"]

[args.properties.to_user]

[args.properties.to_user.description]
it = "(Multi-user) Nome utente o user_id, oppure lista. Es. 'lucia' o ['lucia','marco']. Risolto via users.db. Top-level: applicato a tutti i messages che non hanno gia' un loro to_user."
en = "(Multi-user) Username or user_id, or a list. E.g. 'lucia' or ['lucia','marco']. Resolved via users.db. Top-level: applied to all messages that do not already have their own to_user."

[args.properties.via_channel]
type        = "string"
default     = "auto"
enum        = ["auto", "email", "mail", "telegram", "http"]

[args.properties.via_channel.description]
it = "Canale di invio. Valori canonici: 'email', 'telegram'. Storico: 'mail' = alias di 'email' (back-compat), 'http' = riservato. 'auto' (default multi-user): primo canale verificato dell'utente in ordine telegram > email."
en = "Sending channel. Canonical: 'email', 'telegram'. Legacy: 'mail' = alias of 'email' (back-compat), 'http' = reserved. 'auto' (default multi-user): first verified user channel in order telegram > email."

[args.properties.client]
type        = "string"

[args.properties.client.description]
it = "Implementazione backend del canale (es. 'metnos' per IMAP+SMTP/Telegram locale). Default per channel: email='metnos', telegram='metnos'. Plugin esterni potranno introdurre client aggiuntivi (es. 'gmail') in futuro."
en = "Channel backend implementation (e.g. 'metnos' for local IMAP+SMTP/Telegram). Default per channel: email='metnos', telegram='metnos'. External plugins may add additional clients (e.g. 'gmail') in the future."

[args.properties.messages]
type        = "array"

[args.properties.messages.description]
it = "Lista di messaggi da inviare. Ogni elemento dict con campi: to, subject, body (vedi messages.items.properties). Max 50 per call."
en = "List of messages to send. Each element is a dict with fields: to, subject, body (see messages.items.properties). Max 50 per call."

[args.properties.messages.items]
type     = "object"

[args.properties.messages.items.properties.to]
description = "(Mail) Destinatario singolo (string) o lista di destinatari email. Almeno uno fra `to` e `to_user` deve essere presente."

[args.properties.messages.items.properties.to_user]
description = "(Multi-user) Nome utente / user_id / '@chat_id'. Lista accettata. Alternativa per-message a `to`. Override del top-level `to_user`."

[args.properties.messages.items.properties.via_channel]
type        = "string"
description = "(Multi-user, opzionale) Canale per QUESTO messaggio: 'telegram'|'mail'|'http'|'auto'. Override del top-level `via_channel`."

[args.properties.messages.items.properties.subject]
type        = "string"
description = "Oggetto del messaggio."

[args.properties.messages.items.properties.body]
type        = "string"
description = "Corpo testuale del messaggio. Almeno uno fra body e body_html deve essere presente."

[args.properties.messages.items.properties.body_html]
type        = "string"
description = "Corpo HTML alternativo (opzionale)."

[args.properties.messages.items.properties.cc]
description = "CC singolo (string) o lista."

[args.properties.messages.items.properties.bcc]
description = "BCC singolo (string) o lista."

[args.properties.messages.items.properties.attachments]
type        = "array"
description = "Lista di path file da allegare a QUESTO messaggio. Ogni elemento e' una stringa (path assoluto, ~ espanso) oppure un dict {path, filename?, content_type?}. Mime-type rilevato automaticamente; default application/octet-stream. Cap 25MB totali per messaggio. ESEMPIO: [\"/tmp/contratto.pdf\", \"/home/user/foto.jpg\"]. NB: attachments va DENTRO il singolo message, NON a top-level."
[args.properties.attachments]
type        = "array"

[args.properties.attachments.description]
it = "Shortcut: attachments applicati a TUTTI i messages della call (utile quando si invia un solo messaggio: si puo' mettere attachments al top-level invece di dentro il message). Stesso formato di messages.items.properties.attachments. Se un message ha gia' un suo attachments, quello vince e questo top-level viene ignorato per quel message."
en = "Shortcut: attachments applied to ALL messages of the call (useful when sending a single message: attachments can be placed at the top-level instead of inside the message). Same format as messages.items.properties.attachments. If a message already has its own attachments, those prevail and this top-level is ignored for that message."

[args.properties.account]
type        = "string"
default     = "metnos_system"

[args.properties.account.description]
it = "Account SMTP da usare. Valid: 'metnos_system' (metnos@metnos.com, default) e gli altri account SMTP configurati dall'utente."
en = "SMTP Account to use. Valid: 'metnos_system' (metnos@metnos.com, default) and the other SMTP accounts the user configured."

[[capabilities]]
name = "mail:send"
hint = ["smtp.example.com"]

[[capabilities]]
name = "messaging:send"
hint = ["api.telegram.org"]

[[capabilities]]
name = "fs:read"
hint = ["~/.config/metnos/mail.env", "~/.config/metnos/mail/<account>.env"]

[[tests]]
name   = "messages_non_lista"
input  = { messages = "ciao" }
expect = { ok = false, error_contains = "deve essere una lista" }

[[tests]]
name   = "account_invalido"
input  = { messages = [], account = "ghost" }
expect = { ok = false, field_eq = { error_code = "ERR_UNKNOWN_ACCOUNT" } }

[[tests]]
name   = "vuoto_con_account_valido_noop"
input  = { messages = [], account = "metnos_system" }
expect = { ok = true, metadata_field_eq = { ok_count = 0 } }

[[tests]]
name   = "rate_limit_max_50"
input  = { messages = [{to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}, {to="a@b.c",subject="s",body="b"}] }
