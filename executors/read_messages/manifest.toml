# Manifest dell'executor `read_messages` — Metnos v1.1

manifest_format = "1.0"

name        = "read_messages"
version     = "0.4.0"
author      = "Roberto Brunialti"
affinity    = ["read", "leggi", "mail", "email", "inbox", "messages", "messaggi", "posta", "today", "oggi", "ieri", "ultime", "window", "settimana", "find", "trova", "cerca", "search", "from", "subject", "filter"]
revertible  = false
lifecycle   = "active"

[description]
it = "SCOPO: legge messaggi IMAP combinando filtri temporali e testuali. PATTERN: read_messages(account=\"metnos_system\", folder=\"INBOX\", max_results=20). NON: inviare (-> send_messages) o spostare messaggi (-> move_messages). OUT: entries=[{from,subject,date,message_id,size,body_preview,has_attachment,category_hints}]"
en = "SCOPO: reads IMAP messages combining time and text filters. PATTERN: read_messages(account=\"metnos_system\", folder=\"INBOX\", max_results=20). NON: sending (-> send_messages) or moving messages (-> move_messages). OUT: entries=[{from,subject,date,message_id,size,body_preview,has_attachment,category_hints}]"

[code]
files  = ["read_messages.py"]
digest = "sha256:f727861f0faf03cc4fb28d3afc7ee527a70bbcb09688be6fc911309779b2d197"

[args]
type     = "object"

[args.properties.account]
default     = "metnos_system"

[args.properties.account.description]
it = "Account IMAP da leggere. PUO' ESSERE: (1) una stringa col nome dell'account (es. 'work'); (2) la stringa speciale 'all' per leggere TUTTI gli account configurati e aggregare in una lista unica (loop interno, niente piu' chiamate separate); (3) una lista di nomi (es. ['work','personal']). Per 'tutte le mie mail' usa 'all'. Predefinito: 'metnos_system' (default); gli altri sono gli account configurati dall'utente. Account aggiuntivi: file ~/.config/metnos/mail/<nome>.env con HOST_IMAP/PORT_IMAP/USER/PASS/VERIFY_TLS — il nome del file e' il valore di account."
en = "IMAP Account to read. IT CAN BE: (1) a string with the account name (e.g., 'work'); (2) the special string 'all' to read ALL configured accounts and aggregate them into a single list (internal loop, no more separate calls); (3) a list of names (e.g., ['work','personal']). For 'all my emails' use 'all'. Default: 'metnos_system'; the others are the accounts the user configured. Additional accounts: file ~/.config/metnos/mail/<name>.env with HOST_IMAP/PORT_IMAP/USER/PASS/VERIFY_TLS — the filename is the account value."

[args.properties.folder]
type        = "string"
default     = "INBOX"

[args.properties.folder.description]
it = "Cartella IMAP da leggere. Default 'INBOX'. Esempi (stile Dovecot/Maildir): 'INBOX', 'Sent', 'Drafts', 'Trash', 'Junk'. Esempi (stile Cyrus): 'INBOX', 'INBOX.Sent', 'INBOX.Spam'."
en = "IMAP folder to read. Default 'INBOX'. Examples (Dovecot/Maildir style): 'INBOX', 'Sent', 'Drafts', 'Trash', 'Junk'. Examples (Cyrus style): 'INBOX', 'INBOX.Sent', 'INBOX.Spam'."

[args.properties.max_results]
type        = "integer"
default     = 20

[args.properties.max_results.description]
it = "Numero massimo di email da restituire (le piu' recenti prima). Range 1..200."
en = "Maximum number of emails to return (most recent first). Range 1..200."

[args.properties.unseen_only]
type        = "boolean"
default     = false

[args.properties.unseen_only.description]
it = "Se true, ritorna solo le email non lette (UNSEEN). Default false: tutte."
en = "If true, return only unread emails (UNSEEN). Default false: all."

[args.properties.time_window]
type        = "string"

[args.properties.time_window.description]
it = "Finestra temporale semantica. Valori: 'today', 'yesterday', 'last-Nd' (es. 'last-7d'), 'last-Nh' (es. 'last-24h'). Quando settato senza altri filtri testuali, l'executor ignora max_results e ritorna TUTTE le mail nella finestra (cap max_total). Per finestre custom passa since/before espliciti. Il calcolo di 'oggi' avviene server-side: NON serve chiamare get_now prima."
en = "Semantic time window. Values: 'today', 'yesterday', 'last-Nd' (e.g., 'last-7d'), 'last-Nh' (e.g., 'last-24h'). When set without other text filters, the executor ignores max_results and returns ALL emails within the window (max cap total). For custom windows, pass explicit since/before. The calculation of 'today' occurs server-side: there is NO need to call get_now beforehand."

[args.properties.since]
type        = "string"

[args.properties.since.description]
it = "Data minima IMAP (formato 'DD-Mon-YYYY', es. '22-Apr-2026'). Le mail piu' vecchie di questa data sono escluse. Vince su time_window se entrambi presenti. Per 'ultimi N giorni' chiama get_now e calcola N giorni indietro."
en = "Minimum IMAP date (format 'DD-Mon-YYYY', e.g., '22-Apr-2026'). Emails older than this date are excluded. This takes precedence over time_window if both are present. For 'last N days', call get_now and calculate N days backward."

[args.properties.before]
type        = "string"

[args.properties.before.description]
it = "Data massima IMAP (formato 'DD-Mon-YYYY', es. '29-Apr-2026'). Le mail piu' recenti sono escluse. Combinabile con since per range chiusi."
en = "Maximum IMAP date (format 'DD-Mon-YYYY', e.g., '29-Apr-2026'). The most recent emails are excluded. Can be combined with since for closed ranges."

[args.properties.from_contains]
type        = "string"

[args.properties.from_contains.description]
it = "Substring nel mittente (campo From), case-insensitive lato IMAP server. Es. from_contains='amazon' trova mail da 'noreply@amazon.com', 'orders@amazon.it', ecc. NIENTE wildcard, e' substring puro. Combinabile con altri criteri (AND)."
en = "Substring in the sender (From field), case-insensitive on the IMAP server side. E.g. from_contains='amazon' finds mail from 'noreply@amazon.com', 'orders@amazon.it', etc. NO wildcards, it is a pure substring. Combinable with other criteria (AND)."

[args.properties.subject_contains]
type        = "string"

[args.properties.subject_contains.description]
it = "Substring nell'oggetto, case-insensitive. USA SOLO quando l'utente cita esplicitamente una parola da cercare nel subject (es. 'mail con oggetto fattura'). NON usare per nomi di account o caselle: 'mail metnos' significa 'mail della casella metnos', NON 'mail con metnos nell'oggetto'. Se in dubbio, OMETTI."
en = "Substring in the subject, case-insensitive. USE ONLY when the user explicitly mentions a word to search for in the subject (e.g., 'mail with subject invoice'). DO NOT use for account names or mailboxes: 'metnos mail' means 'mail from the metnos mailbox', NOT 'mail with metnos in the subject'. If in doubt, OMIT."

[args.properties.body_contains]
type        = "string"

[args.properties.body_contains.description]
it = "Substring nel corpo del messaggio. Alcuni server IMAP fanno full-text scan, puo' essere lento su mailbox grosse. Per ricerca generica preferisci subject_contains."
en = "Substring in the message body. Some IMAP servers perform a full-text scan, which can be slow on large mailboxes. For generic searches, prefer subject_contains."

[args.properties.max_total]
type        = "integer"
default     = 1000

[args.properties.max_total.description]
it = "Cap massimo di entries quando si usa time_window senza altri filtri. Range 1..1000. Default 1000 (coerente con find_files/find_dirs su oggetti operabili). Con criteri testuali (from_contains/subject_contains/body_contains) il cap effettivo e' max_results."
en = "Maximum cap of entries when using time_window without other filters. Range 1..1000. Default 1000 (consistent with find_files/find_dirs on operable objects). With textual criteria (from_contains/subject_contains/body_contains) the effective cap is max_results."

[args.properties.page_size]
type        = "integer"
default     = 50

[args.properties.page_size.description]
it = "Dimensione del batch IMAP fetch interno. Default 50. Non e' un limite sul totale (cap = max_total o max_results)."
en = "Internal IMAP fetch batch size. Default 50. This is not a limit on the total (cap = max_total or max_results)."

[args.properties.via_channel]
type        = "string"
default     = "email"
enum        = ["email", "mail", "telegram"]

[args.properties.via_channel.description]
it = "Canale da leggere. Default 'email' (IMAP). 'mail' = alias di 'email' (back-compat). 'telegram' attualmente stub (lettura via daemon long-poll, no inquiry sincrona)."
en = "Channel to read. Default 'email' (IMAP). 'mail' = alias of 'email' (back-compat). 'telegram' currently stub (read via daemon long-poll, no synchronous inquiry)."

[args.properties.client]
type        = "string"

[args.properties.client.description]
it = "Implementazione backend del canale (es. 'metnos' per IMAP locale). Default per channel: email='metnos'. Plugin esterni futuri potranno aggiungere altri client."
en = "Channel backend implementation (e.g. 'metnos' for local IMAP). Default per channel: email='metnos'. Future external plugins may add other clients."

[output]
schema_inline = """
{
  ok: bool,
  ok_count: int,
  fail_count: int,
  entries: Array<{
    uid: str,
    account: str,
    from: str,
    subject: str,
    date: str,
    message_id: str,
    has_attachment: bool,
    body_preview: str,
    category_hints: Array<str>,
    size: int | null
  }>,
  failed: Array<{ account: str, uid?: str, error: str }>,
  accounts: Array<str>,
  window?: str,
  truncated?: bool,
  available_total?: int,
  used?: int,
  truncated_what?: str,
  error?: str
}
"""

[[capabilities]]
name = "mail:read"
hint = ["imap.example.com"]

[[capabilities]]
name = "fs:read"
hint = ["~/.config/metnos/mail.env", "~/.config/metnos/mail/<account>.env"]

[[tests]]
name   = "account_invalido"
input  = { account = "ghost" }
expect = { ok = false, error_contains = "metnos_system" }

[[tests]]
name   = "max_results_invalido"
input  = { account = "metnos_system", max_results = 0 }
expect = { ok = false, error_contains = "max_results" }

# Sample concreto di output (one-shot per synt + fast-path generator).
# Dummy account/uid: NON rappresenta una mail reale.
[[tests]]
name        = "happy_path_sample"
input       = { account = "metnos_system", time_window = "today" }
expect      = { ok = true, has_field = "entries" }
expect_full = """
