# Manifest dell'executor `delete_calendars` — Metnos v1.1
# Naming compositivo §2.2: azione_oggetto. Object `calendars` (3/6/2026).
# Cancella un CALENDARIO-contenitore Google. DESTRUTTIVO + IRREVERSIBILE.

manifest_format = "1.0"
executor_standard = "metnos.executor/1.0"

name        = "delete_calendars"
version     = "0.2.0"
platforms   = ["linux"]
author      = "Roberto Brunialti"
affinity    = [
    "cancella calendario", "elimina calendario", "rimuovi calendario",
    "delete calendar", "remove calendar", "calendario", "calendar"
]
revertible       = false
lifecycle        = "active"

[description]
it = "SCOPO: cancella calendari-contenitore Google (DESTRUTTIVO: elimina anche gli eventi dentro); accetta il NOME. PATTERN: delete_calendars(summary=\"metnos\"). NON: cancellare un EVENTO -> delete_events; creare -> create_calendars. OUT: results=[{ok, calendar_id, deleted}]."
en = "SCOPO: delete Google calendar containers (DESTRUCTIVE: also removes the events inside); accepts the NAME. PATTERN: delete_calendars(summary=\"metnos\"). NON: deleting an EVENT -> delete_events; create -> create_calendars. OUT: results=[{ok, calendar_id, deleted}]."

[code]
files  = ["delete_calendars.py"]
digest = "sha256:76a1657df1b48532a40491255b8250b2591aa5a9efe97aaffb96f55af97c0b48"

[args]
type     = "object"
required = []

[args.properties.ids]
type  = "array"
items = { type = "string" }

[args.properties.ids.description]
it = "Lista di calendar_id da cancellare. MATCH ESATTO (ID Google), wildcard NON supportati. Vettoriale §2.1."
en = "List of calendar_id to delete. EXACT MATCH (Google IDs), wildcards NOT supported. Vectorial §2.1."

[args.properties.calendar_id]
type = "string"

[args.properties.calendar_id.description]
it = "Singolo calendar_id (alternativa a `ids`)."
en = "Single calendar_id (alternative to `ids`)."

[args.properties.summary]
type = "string"

[args.properties.summary.description]
it = "Nome del calendario da cancellare (es. 'metnos'): risolto a id via list, mai il primario. Alternativa a `ids`."
en = "Name of the calendar to delete (e.g. 'metnos'): resolved to id via list, never the primary. Alternative to `ids`."

[args.properties.client]
type = "string"
enum = ["google_workspace"]
runtime_resolved = true

[args.properties.client.description]
it = "Backend. DEVI OMETTERLO: i calendari sono solo Google → runtime forza google_workspace."
en = "Backend. YOU MUST OMIT IT: calendars are Google-only → runtime forces google_workspace."

[output]
schema_inline = """
{
  ok: bool,
  results: Array<dict>,
  used: int,
  ok_count: int,
  error?: str,
  error_class?: str
}
"""

[[capabilities]]
name = "provider:access"
hint = ["google-workspace"]

[placement]
scope = "server"
device_ok = false

[[tests]]
name   = "non_dict_args_fails"
input  = "notadict"
expect = { ok = false }

[[tests]]
name   = "no_target_fails"
input  = {}
expect = { ok = false }

[[tests]]
name   = "wrong_client_rejected"
input  = { ids = ["x"], client = "local" }
expect = { ok = false, error_contains = "local" }
