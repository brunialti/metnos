# Manifest dell'executor `delete_files` — Metnos v1.1 (19/5/2026 v4).
# Naming compositivo §2.2: verbo_oggetto_plurale. Vettoriale per costruzione.
# Reversible §2.3: ogni file ha backup blob → restore_blob_backup.

manifest_format = "1.0"
executor_standard = "metnos.executor/1.0"

name        = "delete_files"
version     = "0.2.0"
platforms   = ["linux", "windows"]
author      = "Roberto Brunialti"
affinity    = [
    "delete", "elimina", "cancella", "rimuovi", "remove",
    "file", "files", "documento", "documenti", "unlink",
            ]

revertible = true
reverse_pattern = "restore_blob_backup"

[description]
it = "SCOPO: cancella file dopo un backup verificato. PATTERN: delete_files(paths=[\"/tmp/a.tmp\"]). NON: directory (-> delete_dirs), symlink o spostamenti (-> move_files). OUT: results=[{path,removed,blob_path,blob_sha256,restore_mode,mode,mtime_ns,atime_ns}], failed e conteggi."
en = "SCOPO: delete files after a verified backup. PATTERN: delete_files(paths=[\"/tmp/a.tmp\"]). NON: directories (-> delete_dirs), symlinks, or moves (-> move_files). OUT: results=[{path,removed,blob_path,blob_sha256,restore_mode,mode,mtime_ns,atime_ns}], failed, and counts."

[code]
files  = ["delete_files.py"]
digest = "sha256:4ecce01dce2db6aed5c0ed0d37af3624d57c1e1322d852f5833fd10389e9fa90"

[args]
type     = "object"
required = ["paths"]

[args.properties.paths]
type        = "array"
items       = { type = "string" }

[args.properties.paths.description]
it = "Lista di path di file da rimuovere. Path assoluti o ~ espandibile. Valori con `*`/`?` = glob, espansi a soli file regolari (es. \"/tmp/logs/*.log\"). Tutti devono essere FILE (non directory) e dentro lo scope fs:write autorizzato. Esempio: [\"/tmp/temp1.txt\", \"~/Downloads/foo.log\"]."
en = "List of file paths to remove. Absolute paths or ~ expandable. Values with `*`/`?` = glob, expanded to regular files only (e.g. \"/tmp/logs/*.log\"). All must be FILES (not directories) and within the authorized fs:write scope. Example: [\"/tmp/temp1.txt\", \"~/Downloads/foo.log\"]."

[args.properties.client]
type        = "string"
enum        = ["local"]
default     = "local"
# config non-intento (lessons A3/B1): risolta dal runtime, NON esposta
# all'LLM. Politica: runtime/tests/test_config_args_marking_policy.py.
runtime_resolved = true

[args.properties.client.description]
it = "Implementazione backend (default 'local' = filesystem locale)."
en = "Backend implementation (default 'local' = local filesystem)."

[output]
schema_inline = """
{
  ok: bool,
  ok_count: int,
  fail_count: int,
  partial?: bool,
  results: Array<{
    path: str,
    removed: bool,
    blob_path: str,
    blob_sha256: str,
    restore_mode: 'create',
    mode: int,
    mtime_ns: int,
    atime_ns: int
  }>,
  failed: Array<{
    index?: int,
    path?: str,
    error_code?: str,
    expected?: str,
    actual?: str,
    error: str
  }>,
  error_class?: str,
  error_code?: str,
  error?: str
}
"""

[[capabilities]]
name = "fs:write"
hint = ["~/notes/**", "/tmp/**"]

[[tests]]
name     = "rimuove_file_singolo"
setup    = "mkdir -p /tmp/metnos_test_delete_files && echo x > /tmp/metnos_test_delete_files/a.txt"
input    = { paths = ["/tmp/metnos_test_delete_files/a.txt"] }
expect   = { ok = true, ok_count_eq = 1 }
teardown = "rm -rf /tmp/metnos_test_delete_files"

[[tests]]
name   = "lista_vuota_ok"
input  = { paths = [] }
expect = { ok = true, ok_count_eq = 0, fail_count_eq = 0 }

[[tests]]
name     = "rifiuta_directory"
setup    = "mkdir -p /tmp/metnos_test_delete_files/subdir"
input    = { paths = ["/tmp/metnos_test_delete_files/subdir"] }
expect   = { ok = false, error_contains = "directory" }
teardown = "rm -rf /tmp/metnos_test_delete_files"

[[tests]]
name   = "path_inesistente_fallisce"
input  = { paths = ["/tmp/metnos_does_not_exist_xyz.txt"] }
expect = { ok = false, fail_count_eq = 1 }

[[tests]]
name   = "args_invalidi_paths_non_lista"
input  = { paths = "/tmp/foo" }
expect = { ok = false, error_contains = "must be a list" }

[[tests]]
name     = "rifiuta_symlink_senza_toccare_target"
setup    = "mkdir -p /tmp/metnos_test_delete_files_link && printf target > /tmp/metnos_test_delete_files_link/target.txt && ln -s target.txt /tmp/metnos_test_delete_files_link/link.txt"
input    = { paths = ["/tmp/metnos_test_delete_files_link/link.txt"] }
expect   = { ok = false, fail_count_eq = 1 }
teardown = "rm -rf /tmp/metnos_test_delete_files_link"

[[tests]]
name   = "client_ignoto_fallisce_tipizzato"
input  = { paths = [], client = "unknown" }
expect = { ok = false, field_eq = { error_code = "ERR_NOT_APPLICABLE" } }

[placement]
# C7 Area-2 est. (6/7): il reverse è ora REMOTABILE (ADR 0183 D3 chiuso —
# restore = copy device-locale blob→path, vedi reverse_patterns): cade
# l'asimmetria che teneva delete server-only. Blob scritti dal device nella
# SUA history prima dell'unlink (§2.9).
scope    = "any"
device_ok = true
