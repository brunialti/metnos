# Manifest dell'executor `group_entries` — Metnos v1.1
# Merge di N liste di entries con dedup per chiave (4/5/2026).

manifest_format = "1.0"
executor_standard = "metnos.executor/1.0"

name        = "group_entries"
version     = "0.1.0"
author      = "Roberto Brunialti"
affinity    = ["group", "raggruppa", "merge", "unisci", "concatena", "dedup", "deduplicate", "join", "combine", "entries"]

[description]
it = "SCOPO: unisce e deduplica entries da più liste. PATTERN: group_entries(entries_lists=[...], dedup_key='url'). NON: calcolare statistiche (-> compute_entries); filtrare (-> filter_entries). OUT: entries=[...], total_in, dedupes."
en = "SCOPO: merges and deduplicates entries from multiple lists. PATTERN: group_entries(entries_lists=[...], dedup_key='url'). NON: compute stats (-> compute_entries); filter (-> filter_entries). OUT: entries=[...], total_in, dedupes."

[code]
files  = ["group_entries.py"]
digest = "sha256:23e27f4a5185a21443e40fecfa7494009e7384416c047961780bf1a7e57e0b97"

[args]
type     = "object"

[args.properties.entries_lists]
type        = "array"

[args.properties.entries_lists.description]
it = "Lista di liste di entries. Ogni elemento e' una lista di dict (l'output di un altro executor). Esempio: [[{...},{...}], [{...}]]."
en = "List of lists of entries. Each element is a list of dicts (the output of another executor). Example: [[{...},{...}], [{...}]]."

[args.properties.entries]
type        = "array"

[args.properties.entries.description]
it = "Lista piatta di entries. Treated come una singola lista (N=1) per compatibilita' con da-piping standard."
en = "Flat list of entries. Treated as a single list (N=1) for compatibility with standard da-piping."

[args.properties.dedup_key]
type        = ["string", "array"]
items       = { type = "string" }
default     = "url"

[args.properties.dedup_key.description]
it = "Campo o lista di campi che identifica un duplicato esatto. Default 'url'. Passa None / vuoto per disabilitare dedup."
en = "Field or field list identifying an exact duplicate. Default 'url'. Pass None / empty to disable dedup."

[args.properties.cross_domain_key]
type        = ["string", "array"]
items       = { type = "string" }

[args.properties.cross_domain_key.description]
it = "Chiave o lista di chiavi opzionale per riconciliare la stessa entità fra domini differenti senza fondere occorrenze distinte nello stesso dominio."
en = "Optional field or field list reconciling the same entity across different domains without merging distinct same-domain occurrences."

[args.properties.domain_field]
type        = "string"
default     = "dominio"

[args.properties.domain_field.description]
it = "Campo che identifica il dominio di origine quando cross_domain_key è attivo."
en = "Field identifying the source domain when cross_domain_key is enabled."

[args.properties.cross_match_fields]
type        = "array"
items       = { type = "string" }
default     = []

[args.properties.cross_match_fields.description]
it = "Campi ordinati per priorità usati per scegliere deterministicamente fra più candidati cross-domain con la stessa chiave."
en = "Priority-ordered fields used to choose deterministically among multiple cross-domain candidates sharing the same key."

[args.properties.missing_conflict_fields]
type        = "array"
items       = { type = "string" }
default     = []

[args.properties.missing_conflict_fields.description]
it = "Campi nei quali un valore presente da una parte e assente dall'altra viene annotato come conflitto. Opt-in; default nessuno."
en = "Fields where a value present on one side and missing on the other is annotated as a conflict. Opt-in; default none."

[args.properties.missing_value_label]
type        = "string"
default     = "missing"

[args.properties.missing_value_label.description]
it = "Etichetta usata nei conflitti per un valore mancante."
en = "Label used in conflict details for a missing value."

[args.properties.required_fields_by_domain]
type        = "object"
default     = {}

[args.properties.required_fields_by_domain.description]
it = "Mappa opzionale dominio->campi obbligatori: un campo assente viene segnalato come conflitto anche se la riga non ha una controparte."
en = "Optional domain-to-required-fields map: a missing field is flagged as a conflict even when the row has no counterpart."

[args.properties.unmatched_conflict_key]
type        = ["string", "array"]
items       = { type = "string" }

[args.properties.unmatched_conflict_key.description]
it = "Chiave forte opzionale per confrontare una coppia unica email/calendario rimasta non unificata, senza fondere le due righe. I gruppi ambigui non vengono confrontati."
en = "Optional strong key for comparing one unique unmatched email/calendar pair without merging its rows. Ambiguous groups are not compared."

[args.properties.unmatched_conflict_fields]
type        = "array"
items       = { type = "string" }
default     = []

[args.properties.unmatched_conflict_fields.description]
it = "Campi diversi da annotare su una coppia unica identificata da unmatched_conflict_key; le righe restano distinte."
en = "Differing fields to annotate on a unique pair identified by unmatched_conflict_key; rows remain separate."

[args.properties.match_field]
type        = "string"

[args.properties.match_field.description]
it = "Campo opzionale da valorizzare deterministicamente con la classe di riconciliazione dopo il merge."
en = "Optional field populated deterministically with the reconciliation class after merging."

[args.properties.match_labels]
type        = "object"

[args.properties.match_labels.description]
it = "Etichette opzionali per exact, probable, email_only, calendar_only, cancelled e unmatched."
en = "Optional labels for exact, probable, email_only, calendar_only, cancelled, and unmatched."

[args.properties.match_state_field]
type        = "string"
default     = "stato"

[args.properties.match_state_field.description]
it = "Campo di stato controllato per riconoscere una cancellazione senza controparte."
en = "State field inspected to recognize a cancellation without a counterpart."

[args.properties.cancellation_states]
type        = "array"
items       = { type = "string" }
default     = []

[args.properties.cancellation_states.description]
it = "Valori o frammenti di stato che identificano una cancellazione."
en = "State values or fragments identifying a cancellation."

[args.properties.reconcile_within_domains]
type        = "array"
items       = { type = "string" }
default     = []

[args.properties.reconcile_within_domains.description]
it = "Domini nei quali la stessa cross_domain_key può essere riconciliata anche fra sorgenti dello stesso dominio, così valori diversi emergono come conflitti. Default: nessuno."
en = "Domains where the same cross_domain_key may also be reconciled across sources in that domain, so differing values surface as conflicts. Default: none."

[args.properties.anchor_field]
type = "string"

[args.properties.anchor_field.description]
it = "Campo opzionale con ancore osservate e runtime-owned per la riconciliazione conservativa quando le chiavi normalizzate differiscono. Richiede anchor_equal_fields e anchor_match_fields."
en = "Optional field carrying observed runtime-owned anchors for conservative reconciliation when normalized keys differ. Requires anchor_equal_fields and anchor_match_fields."

[args.properties.anchor_equal_fields]
type = "array"
items = { type = "string" }
default = []

[args.properties.anchor_equal_fields.description]
it = "Campi di occorrenza che devono essere presenti e identici per ogni candidato basato su anchor_field (per esempio la data)."
en = "Occurrence fields that must be present and equal for every anchor_field candidate (for example the date)."

[args.properties.anchor_match_fields]
type = "array"
items = { type = "string" }
default = []

[args.properties.anchor_match_fields.description]
it = "Segnali osservati, ordinati per priorità, che scelgono un solo candidato tramite uguaglianza o contenimento lessicale. Un pareggio non viene riconciliato."
en = "Observed signals, priority ordered, selecting one candidate through equality or lexical containment. A tie is not reconciled."

[args.properties.anchor_within_domains]
type = "array"
items = { type = "string" }
default = []

[args.properties.anchor_within_domains.description]
it = "Domini nei quali la politica anchor può riconciliare anche duplicati interni allo stesso dominio. Default: nessuno."
en = "Domains where the anchor policy may also reconcile duplicates inside the same domain. Default: none."

[args.properties.drop_unmatched_domains]
type        = "array"
items       = { type = "string" }
default     = []

[args.properties.drop_unmatched_domains.description]
it = "Elimina dall'output finale le righe provenienti esclusivamente dai domini indicati e mai associate ad altri domini; utile per registri di riferimento voluminosi."
en = "Remove final rows originating only from the listed domains and never associated with another domain; useful for large reference registries."

[args.properties.merge_fields]
type        = "array"
items       = { type = "string" }
default     = []

[args.properties.merge_fields.description]
it = "Campi dei duplicati da conservare tutti, unendo i valori distinti in ordine. Default: nessuno (comportamento storico)."
en = "Duplicate fields whose distinct values must all be retained in stable order. Default: none (historical behavior)."

[args.properties.conflict_fields]
type        = "array"
items       = { type = "string" }
default     = []

[args.properties.conflict_fields.description]
it = "Campi da confrontare fra duplicati; valori diversi vengono annotati nel campo conflict_field."
en = "Fields compared across duplicates; differing values are annotated in conflict_field."

[args.properties.conflict_field]
type        = "string"
default     = "conflitto"

[args.properties.conflict_field.description]
it = "Campo di output che raccoglie le differenze rilevate. Default 'conflitto'."
en = "Output field collecting detected differences. Default 'conflitto'."

[args.properties.coalesce_source_facts]
type        = "boolean"
default     = false

[args.properties.coalesce_source_facts.description]
it = "Se true, associa fatti source-level a un soggetto solo quando la stessa origine contiene esattamente un subject_type e un unico valore candidato; fonti ambigue restano invariate."
en = "If true, attach source-level facts to a subject only when the same origin contains exactly one subject_type and one candidate value; ambiguous sources remain unchanged."

[args.properties.source_field]
type        = "string"
default     = "origine"

[args.properties.source_field.description]
it = "Campo che identifica la stessa sorgente durante la coalescenza opt-in."
en = "Field identifying the same source during opt-in coalescence."

[args.properties.type_field]
type        = "string"
default     = "tipo"

[args.properties.type_field.description]
it = "Campo contenente il tipo di record usato per riconoscere il soggetto."
en = "Record-type field used to identify the subject."

[args.properties.subject_types]
type        = "array"
items       = { type = "string" }
default     = ["progetto", "project", "impegno", "commitment"]

[args.properties.subject_types.description]
it = "Tipi ammessi come soggetto principale di una sorgente."
en = "Types admitted as the primary subject of a source."

[args.properties.coalesce_fields]
type        = "array"
items       = { type = "string" }
default     = ["organizzazione", "importo", "scadenza", "decisione", "stato", "responsabile"]

[args.properties.coalesce_fields.description]
it = "Campi source-level copiabili sul soggetto quando il valore candidato e' unico."
en = "Source-level fields that may be copied to the subject when the candidate value is unique."

[output]
schema_inline = """
{
  ok: bool,
  entries: Array<object>,
  ok_count: int,
  fail_count: int,
  total_in: int,
  dedupes: int,
  conflicts: int,
  match_counts: object,
  dropped_unmatched: int,
  coalesced_source_facts: int,
  partial: bool,
  failed: Array<{index: int, error_class: str, error_code: str, error: str}>,
  error_class?: str,
  error_code?: str,
  error?: str
}
"""

[[capabilities]]
name = "compute:pure"
hint = []

[[tests]]
name   = "merge_due_liste"
input  = { entries_lists = [[{ url = "a" }, { url = "b" }], [{ url = "b" }, { url = "c" }]] }
expect = { ok = true, metadata_field_eq = { ok_count = 3, dedupes = 1 } }

[[tests]]
name   = "lista_vuota"
input  = { entries_lists = [] }
expect = { ok = true, metadata_field_eq = { ok_count = 0 } }

[[tests]]
name   = "mixed_lists_is_explicitly_partial"
input  = { entries_lists = [[{url = "a"}], "not-a-list"] }
expect = { ok = true, field_eq = { partial = true, fail_count = 1 } }

[[tests]]
name   = "only_invalid_lists_fails"
input  = { entries_lists = ["not-a-list"] }
expect = { ok = false, field_eq = { partial = false, fail_count = 1 } }

[[tests]]
name   = "outer_value_must_be_a_list"
input  = { entries_lists = "not-a-list" }
expect = { ok = false, field_eq = { error_class = "invalid_input", error_code = "entries_lists_not_list" } }
