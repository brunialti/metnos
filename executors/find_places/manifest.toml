# Manifest dell'executor `find_places` — Metnos v1.1
# Naming compositivo: verbo_oggetto_plurale. Vettoriale per costruzione.

manifest_format = "1.0"

name        = "find_places"
version     = "0.6.0"
author      = "Roberto Brunialti"
# Affinity: verbi + preposizioni di luogo (IT+EN), nessun POI hardcoded.
# I sostantivi (farmacia/restaurant/...) emergono dalla query utente, non
# servono enumerati qui (cattura tutto il long-tail di POI).
affinity    = [
    "trova", "cerca", "cercami", "trovami", "localizza", "find", "search", "locate", "lookup",
                "look-for", "luogo", "luoghi", "place", "places", "POI", "indirizzo",
                "address", "geocoding", "vicino", "vicina", "vicine", "intorno", "dintorni",
                "zona", "in zona", "nelle vicinanze", "near", "nearby", "around", "close-by",
                "in the area", "in proximity"
            ]
revertible  = false
lifecycle   = "active"

[description]
it = "SCOPO: cerca luoghi reali per query testuale o coordinate. PATTERN: find_places(queries=[\"...\"], near={lat:0,lon:0}). NON: leggere file (-> read_files); ottenere dati per ID noti (-> get_places). OUT: entries=[{lat,lon,address,slug,distance_km}]."
en = "SCOPO: find real-world places by text query or coordinates. PATTERN: find_places(queries=[\"...\"], near={lat:0,lon:0}). NON: read files (-> read_files); get data by known IDs (-> get_places). OUT: entries=[{lat,lon,address,slug,distance_km}]."

[code]
files  = ["find_places.py"]
digest = "sha256:30b92eccd801aee75b0e7f06f5bb7ee2ee4a6dd3b0a94d86dc9f5bcd6ba0caa9"

[args]
type     = "object"
required = ["queries"]

[args.properties.queries]
type        = "array"
items       = { type = "string" }

[args.properties.queries.description]
it = "Lista di query testuali (1+). Ogni stringa puo' essere libera (es. 'Roma', 'Via Garibaldi 12 Milano', 'Eiffel Tower')."
en = "List of textual queries (1+). Each string can be free-form (e.g., 'Rome', 'Via Garibaldi 12 Milan', 'Eiffel Tower')."

[args.properties.max_results]
type        = "integer"
default     = 5

[args.properties.max_results.description]
it = "Numero massimo di match per query. Default 5, range 1..50."
en = "Maximum number of matches per query. Default 5, range 1..50."

[args.properties.near]
type        = "object"

[args.properties.near.description]
it = "Coordinate di centro per bias geografico. Forma: {lat: number, lon: number}. Puoi anche passare DIRETTAMENTE l'output di get_location (viene auto-estratto da .location.lat/lon). Quando presente, i risultati includono distance_km e sono ordinati per distanza."
en = "Center coordinates for geographic bias. Format: {lat: number, lon: number}. You can also pass the output of get_location DIRECTLY (it is auto-extracted from .location.lat/lon). When present, results include distance_km and are ordered by distance."

[args.properties.radius_km]
type        = "number"
minimum     = 0.1
default     = 3

[args.properties.radius_km.description]
it = "Raggio di bias in km (usato solo con near). DEFAULT 3 (1/5/2026 v0.2.4): ottimizzato per kNN urbano. Viewbox piu' stretto → Nominatim sceglie i top-50 fra POI low-importance ma piu' vicini, invece di premiare brand globali in area larga. Per query 'in zona X' / 'in raggio di Nkm' aumentare esplicitamente (es. 10/50/100). Determina il viewbox passato a Nominatim."
en = "Bias radius in km (used only with near). DEFAULT 3 (1/5/2026 v0.2.4): optimized for urban kNN. Narrower viewbox → Nominatim selects the top-50 among low-importance but closer POIs, instead of rewarding global brands in a wide area. For queries 'in area X' / 'within a radius of Nkm' explicitly increase (e.g., 10/50/100). Determines the viewbox passed to Nominatim."

[args.properties.bounded]
type        = "boolean"

[args.properties.bounded.description]
it = "Se true E near presente: passa bounded=1 a Nominatim, restringendo STRETTAMENTE ai risultati nel viewbox (no fallback geografico). DEFAULT (1/5/2026 v0.2.3): TRUE quando near e' presente, FALSE altrimenti. Senza bounded il viewbox e' solo bias debole e Nominatim puo' ritornare top match a 150km (caso Correzzola). Per disabilitare lo stretto: passa esplicitamente bounded=false (utile per query 'farmacie nel raggio di 100km' o globali con bias)."
en = "If true AND near is present: pass bounded=1 to Nominatim, STRICTLY restricting to results within the viewbox (no geographic fallback). DEFAULT (1/5/2026 v0.2.3): TRUE when near is present, FALSE otherwise. Without bounded, the viewbox is only a weak bias and Nominatim may return the top match at 150km (e.g., the Correzzola case). To disable the strict restriction: explicitly pass bounded=false (useful for queries like 'pharmacies within a 100km radius' or global queries with bias)."

[output]
schema_inline = """
{
  ok: bool,
  ok_count: int,
  fail_count: int,
  entries: Array<{
    query: str,
    matches: Array<{
      name: str | null,
      lat: float, lon: float,
      address: str,
      place_slug: str,
      osm_type: str | null,
      osm_id: int | null,
      distance_km?: float
    }>
  }>,
  failed: Array<{
    index: int, query: str | null,
    error: str, error_code?: str
  }>,
  backend: str,
  aborted?: bool
}
"""

[[capabilities]]
name = "net:read"
hint = ["nominatim.openstreetmap.org", "localhost"]

[[tests]]
name   = "lista_vuota_ok"
input  = { queries = [] }
expect = { ok = true, ok_count_eq = 0 }

[[tests]]
name   = "args_invalidi_queries_non_lista"
input  = { queries = "Roma" }
expect = { ok = false, error_contains = "deve essere una lista di strings" }

[[tests]]
name   = "max_results_invalido"
input  = { queries = ["Roma"], max_results = 0 }
expect = { ok = false, error_contains = "deve essere compreso fra" }

[[tests]]
name   = "query_non_stringa_fallisce_solo_quella"
input  = { queries = ["Roma", 42] }
expect = { ok = false, fail_count_eq = 1 }

# Sample concreto di output (one-shot per synt + fast-path generator).
# Coordinate plausibili per "farmacia vicino a Brescia" con near.
[[tests]]
name        = "happy_path_sample"
input       = { queries = ["farmacia"], near = { lat = 45.5416, lon = 10.2118 }, max_results = 2 }
expect      = { ok = true, has_field = "entries" }
expect_full = """
{
  "ok": true,
  "ok_count": 1,
  "fail_count": 0,
  "entries": [
    {
      "query": "farmacia",
      "matches": [
        {
          "name": "Farmacia Centrale",
          "lat": 45.541623,
          "lon": 10.211845,
          "address": "Farmacia Centrale, Via Roma 12, 25100, Brescia, Lombardia, Italia",
          "place_slug": "farmacia-centrale",
          "osm_type": "node",
          "osm_id": 123456789,
          "distance_km": 0.05
        },
        {
          "name": "Farmacia San Marco",
          "lat": 45.546201,
          "lon": 10.220334,
          "address": "Farmacia San Marco, Corso Magenta 45, 25100, Brescia, Lombardia, Italia",
          "place_slug": "farmacia-san-marco",
          "osm_type": "node",
          "osm_id": 987654321,
          "distance_km": 0.85
        }
      ]
    }
  ],
  "failed": [],
  "backend": "photon"
}
"""
