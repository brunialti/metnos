# Manifest dell'executor `get_proposals` — Metnos v1.1
# 3/5/2026: review pull-on-demand delle proposte introvertive.
# Legge i JSONL append-only in `~/.local/share/metnos/introvertiva/`
# (audit di run_all dei processi DEDUPE / GENERALIZE / SPECIALIZE),
# ritorna entries strutturati. Niente azione: solo lettura.

manifest_format = "1.0"
executor_standard = "metnos.executor/1.0"

name        = "get_proposals"
version     = "0.2.0"
platforms   = ["linux"]
author      = "Roberto Brunialti"
affinity    = ["proposte introvertiva", "proposte introvertive",
                "proposals introvertiva", "introvertiva", "introvertive",
                "introvertivo", "review pending", "review introvertiva",
                "candidati introvertiva", "introvertive candidates",
                "dedupe mnest", "deduplicazione mnest", "consolidamento mnest",
                "generalize", "generalizzazione", "macro-executor", "macro",
                "specialize", "specializzazione", "specializzato",
                "promozione executor", "consolida mnest", "audit introvertiva",
                "synt", "mnestoma", "introspezione",
                "evaluator", "accept proposal", "reject proposal"]
# Termini ambigui rimossi 11/5/2026 (F4 bonifica): `mostra/mostrami/vedi/
# elenca/elenco` matchavano qualunque query di consultazione ("mostra le
# foto", "elenca i file") inquinando il routing. `stanotte/ieri-sera/
# ultima-volta` matchavano modificatori temporali generici ("annulla
# l'ultima azione" → tie-break con undo_last_turn). Il PLANNER prompt
# (Z.due) gia' indirizza esplicitamente queste query al tool corretto.
# 12/5/2026 (F5 bonifica): termini singoli generici «proposte/proposta/
# proposals/review/pending/candidati/candidates/dedupe/consolidamento»
# matchavano «proponi 3 proposte» o «pending appointment». Tutti
# qualificati con suffisso/prefisso «introvertiva/mnest» discriminante.
# Bug live turn 35431172: get_proposals iniettato via consumer_match su
# arg `kind` (fix collaterale in adaptive_rerank._GENERIC_PIPING_ARGS).
revertible  = false
lifecycle   = "active"

[description]
it = "SCOPO: ottiene proposte introvertive (dedupe/generalize/specialize). PATTERN: get_proposals(kind=\"all\", since_iso=\"2026-05-01T00:00:00Z\"). NON: cercare per pattern (-> find); filtrare lista esistente (-> filter). OUT: entries=[{kind,audit_ts,audit_iso,audit_file,payload}]."
en = "SCOPO: gets introvertive proposals (dedupe/generalize/specialize). PATTERN: get_proposals(kind=\"all\", since_iso=\"2026-05-01T00:00:00Z\"). NON: search by pattern (-> find); filter existing list (-> filter). OUT: entries=[{kind,audit_ts,audit_iso,audit_file,payload}]."

[code]
files  = ["get_proposals.py"]
digest = "sha256:5e20391d13264170c793d1dc52f87cc767a1b4e5dc2725251fffd72c2acfb395"

[args]
type = "object"

[args.properties.kind]
type        = "string"
enum        = ["dedupe", "generalize", "specialize", "all"]
default     = "all"

[args.properties.kind.description]
it = "Tipo di proposta da restituire. 'dedupe' = consolidamenti mnest; 'generalize' = catene candidate a macro-executor; 'specialize' = args dominanti che giustificano variante specializzata; 'all' = unione di tutte e tre."
en = "Type of proposal to return. 'dedupe' = memory consolidations; 'generalize' = candidate chains for macro-executor; 'specialize' = dominant args justifying a specialized variant; 'all' = union of all three."

[args.properties.since_iso]
type        = "string"

[args.properties.since_iso.description]
it = "Timestamp ISO (es. '2026-05-01T00:00:00Z') da cui includere le proposte. Default: 7 giorni fa (rolling window settimanale)."
en = "ISO Timestamp (e.g., '2026-05-01T00:00:00Z') from which to include proposals. Default: 7 days ago (rolling weekly window)."

[args.properties.max_results]
type        = "integer"
default     = 50
minimum     = 1
maximum     = 500

[args.properties.max_results.description]
it = "Cap superiore sulle entries ritornate. Default 50."
en = "Upper cap on the returned entries. Default 50."

[args.properties.include_dormant]
type    = "boolean"
default = false

[args.properties.include_dormant.description]
it = "Se true include anche le proposte in stato dormant. Default false."
en = "If true, also includes proposals in dormant state. Default false."

[output]
schema_inline = """
{
  ok: bool,
  partial?: bool,
  entries?: Array<{kind: str, audit_ts: int, audit_iso: str, audit_file: str, payload: dict}>,
  failed?: Array<{audit_file?: str, invalid_records?: int, error: str, error_class: str, error_code: str}>,
  ok_count?: int,
  fail_count?: int,
  summary_by_kind?: {dedupe: int, generalize: int, specialize: int},
  summary?: str,
  detail_md?: str,
  available_total?: int,
  used?: int,
  duplicates_collapsed?: int,
  filtered_dormant?: int,
  truncated?: bool,
  truncated_what?: str,
  truncated_intentional?: bool,
  cap_field?: str,
  cap_value?: int,
  audit_dir?: str,
  filters?: {kind: str, since_iso: str},
  error?: str,
  error_class?: str,
  error_code?: str
}
"""

[[capabilities]]
name = "metnos:read"
hint = ["introvertiva_proposals:local"]

[placement]
scope = "server"
device_ok = false

[[tests]]
name   = "audit_assente_e_lista_vuota"
env    = { METNOS_USER_DATA = "/tmp/metnos_test_get_proposals_data", METNOS_USER_STATE = "/tmp/metnos_test_get_proposals_state" }
setup  = "rm -rf /tmp/metnos_test_get_proposals_data /tmp/metnos_test_get_proposals_state"
input  = { kind = "all" }
expect = { ok = true, metadata_field_eq = { ok_count = 0, fail_count = 0, truncated = false } }
teardown = "rm -rf /tmp/metnos_test_get_proposals_data /tmp/metnos_test_get_proposals_state"

[[tests]]
name   = "timestamp_invalido_fallisce"
input  = { since_iso = "not-a-date" }
expect = { ok = false, error_contains = "since_iso" }
