# Manifest dell'executor `create_files_doc` — Metnos v1.1
# Naming compositivo §2.2: azione_oggetto_qualifier.
# Dispatcher canonical Google Docs create (24/5/2026).

manifest_format = "1.0"
executor_standard = "metnos.executor/1.0"

name             = "create_files_doc"
version          = "0.2.0"
author           = "Roberto Brunialti"
affinity         = [
    "doc", "documento", "google doc", "google docs",
    "crea documento", "nuovo documento", "create doc", "new doc",
    "draft"
]
revertible       = true
reverse_pattern  = "delete_files_by_id"
lifecycle        = "active"

[description]
it = "SCOPO: crea un nuovo Google Doc. PATTERN: create_files_doc(title='Titolo', body='Testo'). NON: scrivere in doc esistente (-> write_files_doc); creare fogli (-> create_files_spreadsheet). OUT: results=[{document_id, title, web_view_url}]."
en = "SCOPO: creates a new Google Doc. PATTERN: create_files_doc(title='Title', body='Text'). NON: writing to existing doc (-> write_files_doc); creating sheets (-> create_files_spreadsheet). OUT: results=[{document_id, title, web_view_url}]."

[code]
files  = ["create_files_doc.py"]
digest = "sha256:4eb6f23abdf0934863e0db36e3db804b011a6efe1fa899c038a060e4c3318702"

[args]
type     = "object"
required = ["title"]

[args.properties.title]
type    = "string"

[args.properties.title.description]
it = "Titolo del nuovo Google Doc (es. 'Note riunione', 'Diario 2026'). Testo libero, visibile in Drive."
en = "Title of the new Google Doc (e.g. 'Meeting notes', 'Journal 2026'). Free text, visible in Drive."

[args.properties.body]
type    = "string"
default = ""

[args.properties.body.description]
it = "Testo iniziale opzionale da inserire nel doc (es. agenda, sommario). Vuoto = doc vuoto. Per appendere testo dopo, usa write_files_doc."
en = "Optional initial text to insert into the doc (e.g. agenda, summary). Empty = empty doc. To append text later, use write_files_doc."

[args.properties.client]
type    = "string"
enum    = ["google_workspace"]
default = "google_workspace"
# config non-intento (lessons A3/B1): risolta dal runtime, NON esposta
# all'LLM. Politica: runtime/tests/test_config_args_marking_policy.py.
runtime_resolved = true

[args.properties.client.description]
it = "Backend (oggi solo 'google_workspace'). Plugin esterni futuri potranno aggiungerne altri."
en = "Backend (today only 'google_workspace'). Future external plugins may add others."

[output]
schema_inline = """
{
  ok: bool,
  n_created: int,
  document_id: str,
  web_view_url: str,
  title: str,
  results: Array<{file_id, id, document_id, title, web_view_url, kind: 'doc'}>,
  used: int,
  files_source: 'google_workspace',
  _undo?: {reverse_pattern, ids, scope},
  error?: str,
  error_class?: str,
  decision?: 'needs_inputs'
}
"""

[[capabilities]]
name = "metnos:create"
hint = ["doc:remote"]

[[capabilities]]
name = "provider:access"
hint = ["google-workspace"]
when = { arg = "client", values = ["google_workspace"] }

[[tests]]
name   = "missing_title_fails"
input  = {}
expect = { ok = false, error_contains = "title" }

[[tests]]
name   = "empty_title_fails"
input  = { title = "  " }
expect = { ok = false, error_contains = "title" }

[[tests]]
name   = "unsupported_client_fails"
input  = { title = "Test", client = "dropbox" }
expect = { ok = false, error_contains = "Operazione non applicabile per questo provider" }

[[tests]]
name   = "happy_path_with_body"
input  = { title = "Note", body = "Bozza iniziale" }
expect = { ok = true }
