# Manifest dell'executor `login_urls` — login HTTP/cookie del dominio URLs.
# Login a form web e persistenza cookie session (ADR 0082, 4/5/2026).

manifest_format = "1.0"
executor_standard = "metnos.executor/1.0"

name        = "login_urls"
version     = "0.2.0"
platforms   = ["linux"]
timeout_s   = 300
author      = "Roberto Brunialti"
affinity    = ["login", "auth", "autenticazione", "session", "cookie", "credenziali", "password", "form", "web", "site", "spaggiari", "scuola", "banca"]
revertible  = false
lifecycle   = "active"

[description]
it = "SCOPO: autentica HTTP nel dominio URLs e salva cookie 0600. PATTERN: login_urls(domain='portale.example.it') -> read_urls_html(auth_cookies_file=...). NON: sessioni browser -> login_sites; bypass del vault. OUT: {ok,cached,session_cookies,cookie_file}."
en = "SCOPO: authenticate HTTP in the URLs domain and save 0600 cookies. PATTERN: login_urls(domain='portal.example.com') -> read_urls_html(auth_cookies_file=...). NON: browser sessions -> login_sites; vault bypass. OUT: {ok,cached,session_cookies,cookie_file}."

[code]
files  = ["login_urls.py"]
digest = "sha256:91f852299d61e6b63e95c97a006b7220a9f902b7f05c6897f639903fd47d8de7"

[args]
type     = "object"
required = ["domain"]

[args.properties.domain]
type        = "string"

[args.properties.domain.description]
it = "Nome di dominio del sito (es. 'portale.example.it', 'mybank.example.com'). Deve corrispondere a una credenziale gia' salvata via `credentials.store(domain, payload)`."
en = "Site domain name (e.g., 'portale.example.it', 'mybank.example.com'). It MUST match a credential already saved via `credentials.store(domain, payload)`."

[args.properties.force]
type        = "boolean"
default     = false

[args.properties.force.description]
it = "Se true, esegue login anche se un cookie session valido e' gia' cached. Default false."
en = "If true, perform login even if a valid session cookie is already cached. Default false."

[args.properties.timeout_s]
type        = "number"
default     = 15.0
minimum     = 1.0
maximum     = 60.0

[args.properties.timeout_s.description]
it = "Timeout per ogni richiesta HTTP (GET csrf + POST login). Default 15.0."
en = "Timeout for each HTTP request (GET csrf + POST login). Default 15.0."

[args.properties.client]
type        = "string"
enum        = ["httpx", "playwright"]
default     = "httpx"
# config non-intento (lessons A3/B1): risolta dal runtime, NON esposta
# all'LLM. Politica: runtime/tests/test_config_args_marking_policy.py.
runtime_resolved = true

[args.properties.client.description]
it = "Backend di implementazione (default 'httpx' = urllib stdlib + credentials store). 'playwright' = stub (non ancora attivo). Plugin esterni futuri potranno aggiungere altri client."
en = "Backend implementation (default 'httpx' = urllib stdlib + credentials store). 'playwright' = stub (not yet active). Future external plugins may add other clients."

[output]
schema_inline = """
{
  ok: bool,
  cached?: bool,
  session_cookies?: Array<str>,
  expires_at?: int | null,
  login_url?: str,
  domain?: str,
  cookie_file?: str,
  error?: str, error_class?: str, error_code?: str
}
"""

[[capabilities]]
name = "network:http"
hint = ["*"]

[[capabilities]]
name = "auth.password_storage"
hint = ["~/.config/metnos/credentials/*"]

[[capabilities]]
name = "fs:read"
hint = ["~/.config/metnos/cookies/*"]

[[capabilities]]
name = "fs:write"
hint = ["~/.config/metnos/cookies/*"]

[placement]
scope = "server"
device_ok = false

[[tests]]
name   = "errore_se_domain_assente"
input  = {}
expect = { ok = false, error_contains = "domain" }

[[tests]]
name   = "errore_se_credenziali_assenti"
input  = { domain = "no.such.domain.metnos.test" }
expect = { ok = false, error_contains = "no stored credentials" }
