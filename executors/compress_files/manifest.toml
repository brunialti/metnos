# Manifest dell'executor `compress_files` — Metnos v1.1 (4/6/2026).
# Naming compositivo §2.2: verbo_oggetto. Vettoriale per costruzione.
# Reversible §2.3: l'archivio creato → delete_created_paths.

manifest_format = "1.0"
executor_standard = "metnos.executor/1.0"

name        = "compress_files"
version     = "0.2.0"
platforms   = ["linux", "windows"]
author      = "Roberto Brunialti"
affinity    = [
    "comprimi", "comprimere", "compressione", "archivia", "archiviare",
    "compress", "archive", "zip", "tar", "gzip", "archivio", "backup",
]

revertible = true
reverse_pattern = "delete_created_paths"

[description]
it = "SCOPO: comprime file in un nuovo archivio zip/tar/gz. PATTERN: compress_files(from_step=N, dest=\"/dir/out.zip\"). NON: directory, destinazioni esistenti o decompressione (-> extract_files). OUT: results=[{path,created,file_count,archive_bytes,format}], failed, dirs_created e conteggi."
en = "SCOPO: compress files into a new zip/tar/gz archive. PATTERN: compress_files(from_step=N, dest=\"/dir/out.zip\"). NON: directories, existing destinations, or decompression (-> extract_files). OUT: results=[{path,created,file_count,archive_bytes,format}], failed, dirs_created, and counts."

[code]
files  = ["compress_files.py"]
digest = "sha256:d7b12d1f39191cd979a71e05347e58cfa0fa330e9ac5bb8e2d75f1b9c289e2e5"

[args]
type     = "object"
required = ["dest"]
requires_one_of = [["paths", "entries", "from_step"]]

[args.properties.paths]
type        = "array"
items       = { type = "string" }

[args.properties.paths.description]
it = "Lista di path di file da comprimere (es. [\"/tmp/a.txt\",\"/tmp/b.txt\"]). Forma literal per il caso atomico. In alternativa usa `from_step` per ricevere la lista da uno step precedente (find_files)."
en = "List of file paths to compress (e.g., [\"/tmp/a.txt\",\"/tmp/b.txt\"]). Literal form for the atomic case. Alternatively use `from_step` to receive the list from a previous step (find_files)."

[args.properties.from_step]
type        = "integer"
minimum     = 1

[args.properties.from_step.description]
it = "Numero dello step precedente che ha prodotto la lista di file da comprimere (es. find_files al passo 1 -> from_step=1). Alternativa a `paths`."
en = "Number of the previous step that produced the list of files to compress (e.g., find_files at step 1 -> from_step=1). Alternative to `paths`."

[args.properties.entries]
type             = "array"
items            = { type = "object" }
runtime_resolved = true

[args.properties.entries.description]
it = "Lista runtime di record con campo `path`, proiettata da `from_step`. Non passarla manualmente: per input letterale usa `paths`."
en = "Runtime list of records with a `path` field, projected from `from_step`. Do not pass it manually; use `paths` for literal input."

[args.properties.dest]
type        = "string"

[args.properties.dest.description]
it = "Path dell'archivio da creare (es. \"/tmp/backup.zip\"). L'estensione determina il formato (.zip/.tar/.tar.gz/.gz) se `format` non e' dato."
en = "Path of the archive to create (e.g., \"/tmp/backup.zip\"). The extension determines the format (.zip/.tar/.tar.gz/.gz) if `format` is not given."

[args.properties.format]
type        = "string"
enum        = ["zip", "tar", "gztar", "gz"]

[args.properties.format.description]
it = "Formato esplicito: 'zip' (default), 'tar', 'gztar' (.tar.gz), 'gz' (un solo file). Se omesso, dedotto da `dest`."
en = "Explicit format: 'zip' (default), 'tar', 'gztar' (.tar.gz), 'gz' (single file). If omitted, inferred from `dest`."

[output]
schema_inline = """
{
  ok: bool,
  ok_count: int,
  fail_count: int,
  results: Array<{
    path: str,
    created: bool,
    file_count: int,
    archive_bytes: int,
    format: 'zip' | 'tar' | 'gztar' | 'gz'
  }>,
  added?: Array<str>,
  dirs_created?: Array<str>,
  failed: Array<{
    index?: int,
    path?: str,
    error_code?: str,
    error: str
  }>,
  error_class?: str,
  error_code?: str,
  error?: str
}
"""

[[capabilities]]
name = "fs:read"
hint = ["~/**", "/tmp/**"]

[[capabilities]]
name = "fs:write"
hint = ["~/**", "/tmp/**"]

[placement]
scope = "any"
device_ok = true

[[tests]]
name     = "zip_due_file"
setup    = "mkdir -p /tmp/metnos_test_compress && echo a > /tmp/metnos_test_compress/a.txt && echo b > /tmp/metnos_test_compress/b.txt"
input    = { paths = ["/tmp/metnos_test_compress/a.txt", "/tmp/metnos_test_compress/b.txt"], dest = "/tmp/metnos_test_compress/out.zip" }
expect   = { ok = true, ok_count_eq = 2 }
teardown = "rm -rf /tmp/metnos_test_compress"

[[tests]]
name   = "lista_vuota_ok"
input  = { paths = [], dest = "/tmp/metnos_empty.zip" }
expect = { ok = true, ok_count_eq = 0 }

[[tests]]
name   = "dest_mancante_fallisce"
input  = { paths = ["/tmp/x.txt"] }
expect = { ok = false, field_eq = { error_code = "ERR_ARG_MISSING" } }

[[tests]]
name     = "path_inesistente_in_failed"
input    = { paths = ["/tmp/metnos_does_not_exist_zzz.txt"], dest = "/tmp/metnos_x.zip" }
expect   = { ok = false, fail_count_eq = 1 }

[[tests]]
name     = "tar_gz_formato_da_estensione"
setup    = "mkdir -p /tmp/metnos_test_tgz && echo x > /tmp/metnos_test_tgz/a.txt"
input    = { paths = ["/tmp/metnos_test_tgz/a.txt"], dest = "/tmp/metnos_test_tgz/out.tar.gz" }
expect   = { ok = true, ok_count_eq = 1 }
teardown = "rm -rf /tmp/metnos_test_tgz"

[[tests]]
name     = "dest_esistente_non_viene_sovrascritto"
setup    = "mkdir -p /tmp/metnos_test_compress_exists && printf original > /tmp/metnos_test_compress_exists/out.zip && printf source > /tmp/metnos_test_compress_exists/a.txt"
input    = { paths = ["/tmp/metnos_test_compress_exists/a.txt"], dest = "/tmp/metnos_test_compress_exists/out.zip" }
expect   = { ok = false, field_eq = { error_code = "ERR_DST_EXISTS" } }
teardown = "rm -rf /tmp/metnos_test_compress_exists"

[[tests]]
name     = "crea_parent_e_lo_dichiara_per_undo"
setup    = "rm -rf /tmp/metnos_test_compress_parent && mkdir -p /tmp/metnos_test_compress_parent && printf source > /tmp/metnos_test_compress_parent/a.txt"
input    = { paths = ["/tmp/metnos_test_compress_parent/a.txt"], dest = "/tmp/metnos_test_compress_parent/new/nested/out.zip" }
expect   = { ok = true, has_field = "dirs_created" }
teardown = "rm -rf /tmp/metnos_test_compress_parent"

[[tests]]
name     = "formato_non_valido_fallisce_chiuso"
setup    = "mkdir -p /tmp/metnos_test_compress_format && printf source > /tmp/metnos_test_compress_format/a.txt"
input    = { paths = ["/tmp/metnos_test_compress_format/a.txt"], dest = "/tmp/metnos_test_compress_format/out.zip", format = "rar" }
expect   = { ok = false, field_eq = { error_code = "ERR_ARG_INVALID" } }
teardown = "rm -rf /tmp/metnos_test_compress_format"
