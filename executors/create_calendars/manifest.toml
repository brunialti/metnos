# Manifest dell'executor `create_calendars` — Metnos v1.1
# Naming compositivo §2.2: azione_oggetto. Object `calendars` (3/6/2026).
# Crea un CALENDARIO-contenitore Google (distinto da create_events = evento).

manifest_format = "1.0"
executor_standard = "metnos.executor/1.0"

name        = "create_calendars"
version     = "0.2.0"
platforms   = ["linux"]
author      = "Roberto Brunialti"
affinity    = [
    "crea calendario", "nuovo calendario", "create calendar", "new calendar",
    "aggiungi calendario", "add calendar", "calendario", "calendar"
]
revertible       = true
reverse_pattern  = "delete_calendars_by_id"
lifecycle        = "active"

[description]
it = "SCOPO: crea un NUOVO calendario-contenitore Google (non un evento). PATTERN: create_calendars(summary=\"metnos\"). NON: evento/appuntamento -> create_events; elencare -> list_calendars; cancellare -> delete_calendars. OUT: results=[{ok, calendar_id, summary}]."
en = "SCOPO: create a NEW Google calendar container (not an event). PATTERN: create_calendars(summary=\"metnos\"). NON: event/appointment -> create_events; list -> list_calendars; delete -> delete_calendars. OUT: results=[{ok, calendar_id, summary}]."

[code]
files  = ["create_calendars.py"]
digest = "sha256:626e2c10d3211adec640c89561fca346272a9e5f105a2db222e88e0a57804f2c"

[args]
type     = "object"
required = []

[args.properties.summary]
type = "string"

[args.properties.summary.description]
it = "Nome del nuovo calendario. Es. 'metnos', 'Lavoro'. Se omesso, default 'Metnos'."
en = "Name of the new calendar. E.g. 'metnos', 'Work'. If omitted, default 'Metnos'."

[args.properties.description]
type = "string"

[args.properties.description.description]
it = "Descrizione opzionale del calendario (testo libero)."
en = "Optional calendar description (free text)."

[args.properties.timezone]
type = "string"

[args.properties.timezone.description]
it = "Timezone IANA opzionale, es. 'Europe/Rome'. Se omesso, default Google."
en = "Optional IANA timezone, e.g. 'Europe/Rome'. If omitted, Google default."

[args.properties.client]
type = "string"
enum = ["google_workspace"]
runtime_resolved = true

[args.properties.client.description]
it = "Backend. DEVI OMETTERLO: i calendari-contenitore esistono solo su Google → il runtime forza google_workspace."
en = "Backend. YOU MUST OMIT IT: calendar containers exist only on Google → the runtime forces google_workspace."

[output]
schema_inline = """
{
  ok: bool,
  results: Array<dict>,
  n_created: int,
  used: int,
  _undo?: {pattern: 'delete_calendars_by_id', ids: [str]},
  error?: str,
  error_class?: str
}
"""

[[capabilities]]
name = "provider:access"
hint = ["google-workspace"]

[placement]
scope = "server"
device_ok = false

[[tests]]
name   = "non_dict_args_fails"
input  = "notadict"
expect = { ok = false }

[[tests]]
name   = "wrong_client_rejected"
input  = { summary = "Test", client = "local" }
expect = { ok = false, error_contains = "local" }
