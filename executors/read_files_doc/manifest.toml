# Manifest dell'executor `read_files_doc` — Metnos v1.1
# Naming compositivo §2.2: azione_oggetto_qualifier.
# Dispatcher canonical Google Docs read (24/5/2026).

manifest_format = "1.0"

name        = "read_files_doc"
version     = "0.1.0"
author      = "Roberto Brunialti"
affinity    = [
    "doc", "documento", "google doc", "google docs", "docs",
    "leggi documento", "read doc", "testo documento", "document",
    "body doc"
]
revertible  = false
lifecycle   = "active"

[description]
it = "SCOPO: legge testo da Google Doc. PATTERN: read_files_doc(document_id='1abc'). NON: confondere con read_files (locale) o write_files_doc (crea). OUT: entries=[{document_id,title,body_text,content_length}]."
en = "SCOPO: reads text from Google Doc. PATTERN: read_files_doc(document_id='1abc'). NON: confuse with read_files (local) or write_files_doc (creates). OUT: entries=[{document_id,title,body_text,content_length}]."

[code]
files  = ["read_files_doc.py"]
digest = "sha256:f39981c5c1e367b187c26771cb72822c11c878cc53c6c15e7d5c2b077b8ceb9b"

[args]
type     = "object"
required = ["document_id"]

[args.properties.document_id]
type    = "string"

[args.properties.document_id.description]
it = "ID del Google Doc (es. '1abc...XYZ', visibile nell'URL del documento). MATCH ESATTO: stringa opaca fornita da Google, wildcard NON supportati. Per trovarlo se non noto: find_files(client='google_workspace', query='titolo documento')."
en = "Google Doc ID (e.g. '1abc...XYZ', visible in document URL). EXACT MATCH: opaque string provided by Google, wildcards NOT supported. To find it if unknown: find_files(client='google_workspace', query='document title')."

[args.properties.client]
type    = "string"
enum    = ["google_workspace"]
default = "google_workspace"

[args.properties.client.description]
it = "Backend (oggi solo 'google_workspace'). Plugin esterni futuri potranno aggiungerne altri."
en = "Backend (today only 'google_workspace'). Future external plugins may add others."

[output]
schema_inline = """
{
  ok: bool,
  body_text: str,
  title: str,
  document_id: str,
  entries: Array<{document_id, id, title, body_text, content_length, kind: 'doc'}>,
  used: int,
  available_total?: int,
  files_source: 'google_workspace',
  error?: str,
  error_class?: str,
  decision?: 'needs_inputs'
}
"""

[[capabilities]]
name = "metnos:read"
hint = ["doc:remote"]

[[tests]]
name   = "missing_document_id_fails"
input  = {}
expect = { ok = false, error_contains = "document_id" }

[[tests]]
name   = "empty_document_id_fails"
input  = { document_id = "   " }
expect = { ok = false, error_contains = "document_id" }

[[tests]]
name   = "unsupported_client_fails"
input  = { document_id = "1abc", client = "dropbox" }
expect = { ok = false, error_contains = "Operazione non applicabile per questo provider" }

[[tests]]
name   = "happy_path_oauth_missing_returns_needs_inputs"
input  = { document_id = "1abc" }
expect = { ok = true }
