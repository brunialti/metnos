# Manifest dell'executor `get_images_indices` — Metnos v1.1
# Naming compositivo: azione_oggetto[_modalita'] (verb=get, obj=images,
# modalita'=indices). ADR 0086 (rinominato 5/5/2026).

manifest_format = "1.0"
executor_standard = "metnos.executor/1.0"

name        = "get_images_indices"
version     = "0.3.0"
author      = "Roberto Brunialti"
affinity    = ["status", "introspection", "indice", "index", "stato", "snapshot", "info", "foto", "image"]
revertible  = false
platforms   = ["linux"]

[placement]
scope = "server"
device_ok = false

[description]
it = "SCOPO: ottiene lo stato dell'indice immagini unificato per un corpus o per tutti. PATTERN: get_images_indices(); oppure base_path=\"/img\". NON: costruire indici (-> create_images_indices); cercare foto (-> find_images_indices). OUT: entries=[{idx='unified',base_path,exists,n_entries,last_refresh_at,size_mb,model,dim}]."
en = "SCOPO: gets unified image-index status for one corpus or all corpora. PATTERN: get_images_indices(); or base_path=\"/img\". NON: build indexes (-> create_images_indices); search photos (-> find_images_indices). OUT: entries=[{idx='unified',base_path,exists,n_entries,last_refresh_at,size_mb,model,dim}]."

[code]
files  = ["get_images_indices.py"]
digest = "sha256:870b839928b74c2f02f281f4ecef818fe047b6bc5db2c6edeac84c93491810d1"

[args]
type     = "object"
required = []

[args.properties.base_path]
type        = "string"

[args.properties.base_path.description]
it = "Directory radice opzionale della collezione. Se omessa, elenca tutti gli indici unificati materializzati senza scandire gli alberi foto."
en = "Optional collection root. If omitted, lists every materialized unified index without scanning photo trees."

[args.properties.idx]
type        = "string"
enum        = ["unified", "scene", "persons", "gps", "all"]
default     = "all"

[args.properties.idx.description]
it = "Indice da ispezionare. 'all' e 'unified' indicano lo storage v4 attivo; scene/persons/gps servono solo a diagnosticare layout v3 obsoleti."
en = "Index to inspect. 'all' and 'unified' select active v4 storage; scene/persons/gps only diagnose obsolete v3 layouts."

[output]
schema_inline = """
{
  ok: bool,
  base_path?: str,
  index_root?: str,
  entries?: [{idx: str, exists: bool, base_path?: str, index_path?: str, size_bytes?: int, size_mb?: number, n_entries?: int, n_faces?: int, last_refresh_at?: str | number | null, model?: str, model_face?: str, model_image?: str, dim?: int, version?: int}],
  n_entries?: int,
  indexed_entries_total?: int,
  ok_count?: int,
  fail_count?: int,
  partial?: bool,
  failed?: [{idx: str, index_path: str, error: str, error_class: str, error_code: str, detail?: str}],
  error?: str,
  error_class?: 'invalid_input',
  error_code?: str
}
"""

[[capabilities]]
name = "index:read"
hint = ["image"]

[[tests]]
name   = "base_path_qualunque_ok_lista_anche_se_vuota"
input  = { base_path = "/tmp/metnos_test_idx_get_inexistent", idx = "all" }
expect = { ok = true }

[[tests]]
name   = "idx_invalido_fallisce"
input  = { base_path = "/tmp/metnos_test_idx_get", idx = "pippo" }
expect = { ok = false, error_contains = "idx" }

[[tests]]
name   = "discovery_senza_base_path"
input  = {}
expect = { ok = true }
