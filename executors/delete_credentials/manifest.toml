# Manifest dell'executor `delete_credentials` — Metnos v1.1
# Naming compositivo: azione_oggetto. 16 OBJECT credentials (10/5/2026).
# Invariante di sicurezza: metadata-only (capability metnos:credentials_metadata_only).
# Verbo `delete` §2.2: mutazione terminale. Modello delete_persons ADR 0086 PR2.

manifest_format = "1.0"

name        = "delete_credentials"
version     = "0.1.0"
author      = "Roberto Brunialti"
affinity    = ["dimentica credenziale", "rimuovi token", "cancella credenziali",
                "revoca account", "elimina chiave", "purge credenziali",
                "forget credential", "remove token", "delete credential",
                "revoke account", "wipe credentials", "delete all credentials"]

[description]
it = "SCOPO: cancella credenziali dallo storage (purge o binding). PATTERN: delete_credentials(bindings=[\"x\"]) o all=true. NON: leggere (-> find_credentials) o salvare (-> set_credentials); non usare bindings con all=true. OUT: {ok, results:[{binding, deleted, removed_fields_count}], n_deleted}."
en = "SCOPO: delete credentials from storage (purge or bindings). PATTERN: delete_credentials(bindings=[\"x\"]) or all=true. NON: read (-> find_credentials) or save (-> set_credentials); do not use bindings with all=true. OUT: {ok, results:[{binding, deleted, removed_fields_count}], n_deleted}."

[code]
files  = ["delete_credentials.py"]
digest = "sha256:b40a942c0786dc563f87875bcc4206403e39484069f2c54bbfb0b01a5f062701"

[args]
type     = "object"
required = []

[args.properties.bindings]
type  = "array"
items = { type = "string" }

[args.properties.bindings.description]
it = "Lista di binding da cancellare (plurale canonico §2.1). MATCH ESATTO: ogni binding e' un identificatore opaco, wildcard `*`/`?` NON supportati. Ogni binding non trovato finisce in `unknown_bindings` con `deleted=false` nei `results`."
en = "List of bindings to delete (canonical plural §2.1). EXACT MATCH: each binding is an opaque identifier, wildcards `*`/`?` NOT supported. Each not-found binding ends up in `unknown_bindings` with `deleted=false` in `results`."

[args.properties.binding]
type        = "string"

[args.properties.binding.description]
it = "Forma singolare (alias di `bindings=[binding]`). Pattern §2.4: arg singolare ammesso per N=1."
en = "Singular form (alias for `bindings=[binding]`). Pattern §2.4: singular arg allowed for N=1."

[args.properties.all]
type        = "boolean"
default     = false

[args.properties.all.description]
it = "Se `true`, cancella TUTTE le credenziali memorizzate (purge totale). Mutualmente esclusivo con `bindings`/`binding`."
en = "If `true`, deletes ALL stored credentials (full purge). Mutually exclusive with `bindings`/`binding`."

[output]
schema_inline = """
{
  ok: bool,
  results: Array<{binding, deleted, removed_fields_count}>,
  n_deleted: int,
  unknown_bindings?: Array<str>,
  error?: str,
  final_message_hint?: str
}
"""

[[capabilities]]
name = "metnos:credentials_metadata_only"
hint = ["~/.local/share/metnos/credentials/"]

[[capabilities]]
name = "metnos:write"
hint = ["~/.local/share/metnos/credentials/"]

# Reverse pattern §2.3: delete e' terminale (modello delete_persons ADR 0086 PR2).
# Il catalogo deterministico non copre delete_credentials. Per ripristinare,
# l'utente esegue set_credentials con gli stessi valori.
reversible = false

[[tests]]
name   = "rejects_no_args"
input  = {}
expect = { ok = false, error_contains = "binding" }

[[tests]]
name   = "rejects_all_and_bindings_together"
input  = { all = true, bindings = ["svc"] }
expect = { ok = false, error_contains = "mutually exclusive" }
