<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>{% block title %}Metnos{% endblock %}</title>
<style>
:root{--bg:#fafafa;--fg:#222;--muted:#777;--border:#e0e0e0;--accent:#3a4d6c;}
*{box-sizing:border-box}
html,body{margin:0}
body{font:14px system-ui,-apple-system,sans-serif;color:var(--fg);background:transparent;padding:.4rem .6rem}
main{padding:0;margin:0}
table{width:100%;border-collapse:collapse}
th,td{border-bottom:1px solid #ddd;padding:.4rem;text-align:left;vertical-align:top}
.chip{display:inline-block;padding:.1rem .4rem;border-radius:.3rem;background:#eef;font-size:.85em}
.muted{color:#888}
.btn{display:inline-block;padding:.25rem .8rem;border:1px solid #aaa;border-radius:.3rem;background:#f8f8f8;font-size:.95em;cursor:pointer;text-decoration:none;color:#333}
.btn:hover{background:#eef}
.section{margin:0;padding:0;border:none;border-radius:0;background:transparent}
.section h2{margin:0 0 .4rem 0;font-size:1.05em;color:var(--accent)}
code{background:#f4f4f4;padding:.1em .3em;border-radius:.2em}
</style>
</head>
<body>
<main>{% block body %}{% endblock %}</main>
</body></html>
