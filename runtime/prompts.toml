# Metnos — repertorio dei prompt addendum provider-specifici.
#
# Stile obbligatorio degli hint:
#   - BREVI: una o due righe, non un paragrafo.
#   - PRESCRITTIVI: imperativo ("Vincoli: X. Y. Z."), niente esempi long-form,
#     niente rationale ("Why").
#   - Il "Why" e i bug osservati vivono nelle memorie di progetto, NON qui.
#
# Lookup: l'addendum scelto e' il primo che soddisfa
#   provider == h.provider
#   fnmatch(model, h.model_pattern)
#   use_case == h.use_case
# Mettere prima i pattern piu' specifici.
#
# File caricati in ordine (l'ultimo vince per match identico):
#   1. /opt/metnos/runtime/prompts.toml          (default bundled, questo file)
#   2. ~/.config/metnos/prompts.toml             (override utente)

# --- Anthropic Claude 4.x: piu' letterale; tende a regex con lookbehind/lookahead.
[[hint]]
provider      = "anthropic"
model_pattern = "claude-*"
use_case      = "code_gen"
text          = "\n\nVincoli: codice fedele alla spec. Regex semplice. Niente lookbehind/lookahead."

# --- Gemma 4 (llama.cpp): over-escape ricorrente di raw string e triple-quote.
[[hint]]
provider      = "llamacpp"
model_pattern = "gemma-4-*"
use_case      = "code_gen"
text          = "\n\nVincoli: raw string r'...' con UN backslash. Niente triple-quote docstring."

# --- Famiglia Gemma generica (fallback se non e' Gemma 4 specifico)
[[hint]]
provider      = "llamacpp"
model_pattern = "gemma-*"
use_case      = "code_gen"
text          = "\n\nVincoli: raw string r'...' con UN backslash. Codice fedele alla spec."

# --- Qwen 3 via Ollama: tendenza a omettere il campo python_code.
[[hint]]
provider      = "ollama"
model_pattern = "qwen3:*"
use_case      = "code_gen"
text          = "\n\nVincoli: compila python_code per intero (def invoke + def main). Mai vuoto."

# --- Qwen 2.5 via Ollama
[[hint]]
provider      = "ollama"
model_pattern = "qwen2.5:*"
use_case      = "code_gen"
text          = "\n\nVincoli: compila python_code per intero. Solo stdlib."

# --- OpenAI GPT-5: piu' letterale, predilige istruzioni brevi (cookbook GPT-5).
[[hint]]
provider      = "openai"
model_pattern = "gpt-5*"
use_case      = "code_gen"
text          = "\n\nVincoli: content e' stringa (non lista). Codice fedele alla spec. Solo stdlib."

# --- OpenAI GPT-4.1: tendenza a mettere lista in content (osservato 26/4).
[[hint]]
provider      = "openai"
model_pattern = "gpt-4.1*"
use_case      = "code_gen"
text          = "\n\nVincoli: content e' stringa (non lista). Codice fedele alla spec. Solo stdlib."

# --- OpenAI GPT generico (fallback)
[[hint]]
provider      = "openai"
model_pattern = "gpt-*"
use_case      = "code_gen"
text          = "\n\nVincoli: content e' stringa. Codice fedele alla spec. Solo stdlib."
