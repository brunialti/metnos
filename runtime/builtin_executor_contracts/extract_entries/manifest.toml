manifest_format = "1.0"
executor_standard = "metnos.executor/1.0"
name = "extract_entries"
version = "1.0.0"
author = "Metnos builtin maintainers"
affinity = []
platforms = ["linux"]
revertible = false
lifecycle = "active"

[description]
it = "SCOPO: Estrae record strutturati da entries gia' osservate. PATTERN: richiesta naturale tipizzata dal planner. NON: ampliare autorita o inventare input. OUT: risultato JSON dichiarato."
en = "SCOPO: Extracts structured records from already observed entries. PATTERN: natural request typed by the planner. NON: enlarge authority or invent inputs. OUT: declared JSON result."

[code]
files = ["../../extract_entries.py"]
digest = "sha256:ab39087a2aca4f1120852bdff058cb63241ca24a50d70328580e98fff8b9999e"

[args]
type = "object"
required = ["from_step"]

[args.properties.from_step]
type = "integer"
minimum = 1

[args.properties.from_step.description]
it = "Numero dello step (in questo turno) che ha prodotto le entries di testo da cui estrarre (es. read_urls_html al passo 2 → from_step=2)."
en = "Previous producer step supplying entries."

[args.properties.fields]
type = "array"

[args.properties.fields.description]
it = "Campi di OGNI record da estrarre. Se omesso, viene inferito un set bounded dallo scopo e dal testo osservato."
en = "Fields to expose or extract from each entry."

[args.properties.fields.items]
type = "string"

[args.properties.audit_fields]
type = "array"

[args.properties.audit_fields.description]
it = "Campi source-level etichettati estratti deterministicamente e associati a ogni record della stessa sorgente senza modificarne il numero."
en = "Labeled source-level fields extracted deterministically without changing record count."

[args.properties.audit_fields.items]
type = "string"

[args.properties.structured_map]
type = "object"

[args.properties.structured_map.description]
it = "Adattatore deterministico opzionale per entries gia' strutturate con nomi-campo diversi: output_field -> source_field o lista ordinata di fallback. Evita chiamate LLM per semplici rinomine/copied facts."
en = "Argument structured_map."

[args.properties.structured_defaults]
type = "object"

[args.properties.structured_defaults.description]
it = "Valori scalari predefiniti per i campi non valorizzati da structured_map."
en = "Argument structured_defaults."

[args.properties.relevance_entries]
type = "array"

[args.properties.relevance_entries.description]
it = "Record osservati da una sorgente-ancora; le loro entità selezionano deterministicamente le sole sorgenti testuali pertinenti prima delle chiamate LLM."
en = "Observed anchor records used for deterministic relevance filtering."

[args.properties.relevance_fields]
type = "array"

[args.properties.relevance_fields.description]
it = "Campi di relevance_entries dai quali derivare le ancore di pertinenza."
en = "Anchor-record fields used to derive relevance terms."

[args.properties.relevance_fields.items]
type = "string"

[args.properties.relevance_terms]
type = "array"

[args.properties.relevance_terms.description]
it = "Ancore testuali esplicite aggiuntive per il prefilter di pertinenza."
en = "Additional explicit terms used for relevance filtering."

[args.properties.relevance_terms.items]
type = "string"

[args.properties.state_markers]
type = "object"

[args.properties.state_markers.description]
it = "Mappa opzionale stato normalizzato -> frasi sorgente osservabili. Riempie un campo stato/status vuoto senza sovrascrivere fatti esistenti."
en = "Optional normalized-state to observed source phrases mapping."

[args.properties.instruction]
type = "string"

[args.properties.instruction.description]
it = "Cosa estrarre, in linguaggio naturale. Es. \"le prossime conferenze con la loro data\"."
en = "Narrow extraction instruction."

[args.properties.max_per_text]
type = "integer"

[args.properties.max_per_text.description]
it = "Max record per singola sorgente (default 20)."
en = "Maximum records extracted from one source text."

[args.properties.max_total]
type = "integer"

[args.properties.max_total.description]
it = "Cap totale record (0 = nessun limite)."
en = "Maximum records across all sources."

[args.properties.max_sources]
type = "integer"

[args.properties.max_sources.description]
it = "Cap esplicito delle sorgenti da elaborare (default 50, massimo 1000)."
en = "Maximum number of independent sources to process."

[args.properties.batch_size]
type = "integer"

[args.properties.batch_size.description]
it = "Numero di sorgenti indipendenti per richiesta LLM (default 1, massimo 16). Usare solo con drill_down=false; ordine e provenienza sono preservati con fallback seriale per sorgente."
en = "Maximum entries or independent sources per model batch."

[args.properties.drill_down]
type = "boolean"

[args.properties.drill_down.description]
it = "Se true può leggere i link presenti nelle sorgenti per completare campi mancanti. Default true; usare false per pagine di sessione autenticate."
en = "Allow bounded follow-up extraction on nested content."

[output]
schema_inline = "{ok: bool, entries: Array<object>, partial?: bool, truncated?: bool, error?: str, error_class?: str, error_code?: str}"

[[capabilities]]
