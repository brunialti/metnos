# Generated by scripts/generate_builtin_executor_contracts.py.
manifest_format = "1.0"
executor_standard = "metnos.executor/1.0"
name = "classify_entries"
version = "1.0.0"
author = "Metnos builtin maintainers"
affinity = []
platforms = ["linux"]
revertible = false
lifecycle = "active"

[description]
it = "SCOPO: Classifica entries in un insieme chiuso di classi. PATTERN: richiesta naturale tipizzata dal planner. NON: ampliare autorita o inventare input. OUT: risultato JSON dichiarato."
en = "SCOPO: Classifies entries into a closed set of classes. PATTERN: natural request typed by the planner. NON: enlarge authority or invent inputs. OUT: declared JSON result."

[code]
files = ["../../classify_entries.py"]
digest = "sha256:53b91c2a95824b10cb140e37b0cc8c6feb121ae991fd021e7d92282bcca36fe5"

[args]
type = "object"
required = ["from_step"]

[args.properties.from_step]
type = "integer"
minimum = 1

[args.properties.from_step.description]
it = "Numero dello step precedente (in questo turno) che ha prodotto la lista da classificare. Es. se al passo 1 hai chiamato read_messages, qui passi from_step=1."
en = "Previous producer step supplying entries."

[args.properties.dimension]
type = "string"
default = "relevance"

[args.properties.dimension.description]
it = "Dimensione di classificazione. 'relevance' (default), 'urgency', 'sentiment', 'topic'. Il valore diventa il nome del campo aggiunto a ciascuna entry."
en = "Classification dimension."

[args.properties.classes]
type = "array"

[args.properties.classes.description]
it = "Set chiuso di classi ammesse. Default per dimension: relevance=['junk','low','medium','high'], urgency=['none','later','soon','now'], sentiment=['negative','neutral','positive']. Per 'topic' DEVI fornire le classi (es. ['lavoro','famiglia','svago'])."
en = "Closed list of allowed output classes."

[args.properties.classes.items]
type = "string"

[args.properties.criterion]
type = "string"

[args.properties.criterion.description]
it = "Criterio in linguaggio naturale che definisce le classi. Default ragionevole per relevance/urgency/sentiment; per 'topic' e dimensioni custom il caller DEVE fornirlo. Esempio: \"rilevante = richiede una mia azione; junk = newsletter, promo\"."
en = "Classification criterion."

[args.properties.data_kind]
type = "string"
default = "auto"

[args.properties.data_kind.description]
it = "Tipo semantico delle entries ('email', 'web_result', 'file', 'generic'). 'auto' (default) deduce. Determina i fields default mostrati al classifier."
en = "Input data kind hint."

[args.properties.pre_filter]
type = "boolean"
default = false

[args.properties.pre_filter.description]
it = "Se true e data_kind='email' e dimension='relevance', applica regole tassonomiche conservative basate su category_hints (list+bulk+noreply -> junk, ecc.) prima del LLM. Le entries pre-filtrate non vanno al LLM. Default false: in osservazione finche' non si convalida che le regole non sotto-etichettino."
en = "Optional deterministic pre-filter."

[args.properties.batch_size]
type = "integer"
default = 30

[args.properties.batch_size.description]
it = "Dimensione del batch al LLM. Default 30. Batch piu' grossi = meno chiamate ma piu' rischio di output mal-formato."
en = "Maximum entries or independent sources per model batch."

[args.properties.tier]
type = "string"
default = "auto"
enum = ["auto", "fast", "middle", "wise"]

[args.properties.tier.description]
it = "Tier LLM. 'auto' (default) sceglie fast per batch piccoli, middle per piu' grossi. Per task soggettivi o domini tecnici considera middle/wise."
en = "Runtime model tier selector."

[args.properties.fields]
type = "array"

[args.properties.fields.description]
it = "Quali campi della entry mostrare al classifier. Default per data_kind: email = [from, subject, body_preview, category_hints]. Riduci se le entries hanno body lunghi: il classifier non ha bisogno di tutto."
en = "Fields to expose or extract from each entry."

[args.properties.fields.items]
type = "string"

[output]
schema_inline = "{ok: bool, entries: Array<object>, partial?: bool, error?: str, error_class?: str, error_code?: str}"

[[capabilities]]
name = "llm:local"
hint = ["classification"]

[[capabilities]]
name = "llm:online"
hint = ["classification"]

[placement]
scope = "server"
device_ok = false

[[tests]]
name = "builtin_contract_domain_suite"
reference = "runtime/tests/test_builtin_executor_contracts.py"
