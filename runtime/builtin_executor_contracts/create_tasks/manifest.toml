[args.properties.times.description]
it = "Numero massimo di esecuzioni. OMETTI per ricorrenza infinita (default). 1 = ONE-SHOT (esegue una volta sola, poi auto-cancella). N = max N volte poi auto-cancella. Combinabile con qualsiasi `when`."
en = "Maximum number of task executions."

[args.properties.grace_window_minutes]
type = "integer"
minimum = 1

[args.properties.grace_window_minutes.description]
it = "Tolleranza ritardo in minuti per recover-missed (daemon down al `when`). Es. 240 = fire entro 4h dal target, oltre skip. OMETTI = recover illimitato."
en = "Allowed late-fire window in minutes."

[output]
