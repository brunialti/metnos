[description]
it = "SCOPO: Crea un task schedulato o ricorrente. PATTERN: richiesta naturale tipizzata dal planner. NON: ampliare autorita o inventare input. OUT: risultato JSON dichiarato."
en = "SCOPO: Creates a scheduled or recurring task. PATTERN: natural request typed by the planner. NON: enlarge authority or invent inputs. OUT: declared JSON result."

[code]
files = ["../../recurring_tasks.py"]
digest = "sha256:d1c4834cd77ca470da36f8c0ade970bafbb6c1db56dd0516261ebb561ad9cdd4"

[args]
type = "object"
required = ["label", "when", "query"]

[args.properties.label]
type = "string"

[args.properties.label.description]
it = "Etichetta umana del task (es. 'check posta mattutina'). Usata per cancellare/elencare e come prefisso del messaggio di output."
en = "Human-readable task label."

[args.properties.when]
type = "string"

[args.properties.when.description]
it = "Quando: 'daily@HH:MM' (es. 'daily@08:00') oppure 'every_Nm' (es. 'every_30m'). HH:MM e' ora locale del SO host (es. CEST in Italia, gestita automaticamente dallo scheduler): registra l'orario cosi' come l'ha detto l'utente, senza convertire fusi. Per 'fra X minuti' o 'fra X ore' usa 'every_Xm' + times=1."
en = "Schedule expression."

[args.properties.query]
type = "string"

[args.properties.query.description]
it = "Query da rilanciare al fire del task, in italiano. Es. 'leggi le mail di oggi importanti', 'ricordami di chiamare Roberto'. Il task la passera' a un nuovo run_turn."
en = "Natural-language query to run when the task fires."

[args.properties.times]
type = "integer"
