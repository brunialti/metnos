# Frontmatter equivalente a `{# --- ... --- #}` Jinja (the design guide §6.1).
role: planner
tier: middle
lang: it
style: prescriptive
version: 1
owner: roberto
updated: 2026-05-13
sha_prev: ""

section:
  name: web_crawl
  header: "WEB / CRAWLER (read_urls_html, read_urls_pdf, soft-fail)"
  preamble: |
    LETTURA PAGINE WEB E PDF (read_urls_html, read_urls_pdf, get_urls_text)
    -> URL esplicito + dati nella pagina = primo step read_urls_html. Soft-fail e SPA gestiti deterministicamente.

rules:
  - name: url_explicit_seed
    when: "l'utente fornisce un URL specifico (path completo, non solo dominio) e chiede dati contenuti IN quella pagina. Esempi: «leggi https://...», «qual e' il contenuto di https://...», «dimmi i risultati su https://.../calendario», «esplora in profondita' https://.../sezione». L'utente vuole il CONTENUTO della pagina che ti ha dato, NON la struttura del sito attorno"
    must: "read_urls_html(urls=[<URL_utente>]) come PRIMO step. Fallback: solo se read_urls_html ritorna text vuoto/insufficiente, considera find_urls per discovery laterale (es. cercare un PDF linkato dalla pagina) o read_urls_pdf su URL PDF visibili"
    must_not: "find_urls in primo step quando l'utente ha gia' indicato l'URL. find_urls fa BFS e ritorna URL+titoli, NON il contenuto della pagina specifica. L'utente perde 30 minuti e ottiene 58 URL inutili"
    ok: "«dimmi i risultati di girone F giornata 22 su https://www.federvolley.it/serie-b-maschile-calendario» -> read_urls_html(urls=[\"https://www.federvolley.it/serie-b-maschile-calendario\"])"
    error: "stesso prompt -> find_urls(seed_urls=[\"https://www.federvolley.it/...\"]) (E' UN ERRORE: find_urls fa BFS, non legge il contenuto)"

  - name: js_rendered_retry
    when: "uno step read_urls_html ritorna entries con error_class=\"js_rendered\" (oppure failed[] con la stessa error_class). La pagina e' una SPA: l'HTML iniziale e' uno scheletro che il browser idrata via JavaScript. Metnos puo' passare al sidecar Playwright (Chromium headless) per ottenere l'HTML renderizzato"
    must: "re-invocare read_urls_html(urls=[<URL_fallito>], js_render=true) come step successivo. Il runtime probera' il sidecar; se UP, renderizza la pagina e ritorna entries con body_text popolato dal DOM materializzato. Costo: ~500ms-2s extra per pagina, ~200MB RAM sul sidecar. Opt-in esplicito tramite js_render=true; il default resta false per non rallentare i turn normali"
    must_not: "arrenderti su prima fail e dichiarare all'utente «non posso leggere» senza aver provato js_render=true. NON DEVI ripetere con js_render=true se quel retry e' gia' fallito (es. js_render_sidecar_available=false oppure sidecar timeout su quell'URL)"
    ok: "step1 read_urls_html(urls=[\"https://spa.example/x\"]) -> entries[0].error_class=\"js_rendered\" -> step2 read_urls_html(urls=[\"https://spa.example/x\"], js_render=true) -> entries[0].body_text non vuoto, js_rendered_via_sidecar=true -> step3 describe_entries(from_step=2, style=\"by_relevance\") -> final_answer"
    error: "step1 error_class=\"js_rendered\" -> final_answer \"non riesco a leggere\" senza aver provato js_render=true (E' UN ERRORE)"

  - name: url_failed_soft_fail
    when: "uno step precedente di lettura URL (read_urls_html, read_urls_pdf, get_urls_text) ha ritornato ok=false oppure entries vuote con failed[] non vuoto. Le entry di failed[] espongono error_class deterministico: forbidden, rate_limited, not_found, server_error, timeout, non_html, js_rendered, network, unknown"
    must: |
      formulare final_answer ONESTO che dichiara la classe di errore e suggerisce un'alternativa concreta:
      - forbidden/rate_limited -> «il sito blocca il crawler (HTTP 403/429). Alternative: cache di Google, archive.org/web, oppure forniscimi tu un PDF/screenshot della pagina»
      - timeout/network -> «il sito non risponde adesso, riprova fra qualche minuto»
      - js_rendered -> PRIMA tenta il retry con js_render=true (regola js_rendered_retry). Solo se anche quel retry fallisce (js_render_sidecar_available=false oppure sidecar timeout), dichiara: «la pagina e' una SPA e il sidecar JS-render non e' disponibile. Verifica linked_documents per PDF disponibili»
      - non_html -> «la risorsa non e' HTML. Probabile PDF: prova read_urls_pdf sullo stesso URL»
      - not_found -> «la pagina non esiste (HTTP 404). Verifica l'URL»
      - server_error -> «il sito ha un errore interno (HTTP 5xx), riprova piu' tardi»
    must_not: "rifare read_urls_html, read_urls_pdf, get_urls, get_urls_text, find_urls sullo STESSO URL gia' fallito. Il re-fetch non recupera: l'errore e' lato server o di struttura"
    ok: "history step1 read_urls_html(urls=[\"https://www.python.org/about/\"]) -> failed=[{url:\".../about/\", error_class:\"forbidden\"}] -> step2 final_answer \"Il sito python.org/about blocca il crawler (HTTP 403). Alternative: cache Google, archive.org. Se vuoi, fornimi un PDF/screenshot\""
    error: "stesso scenario -> step2 find_urls(seed_urls=[\"https://www.python.org/\"]) (E' UN ERRORE: URL gia' fallito non si sblocca con discovery laterale)"

  - name: url_partial_fail
    when: "read_urls_html con N>1 urls ritorna entries[] non vuoto MA anche failed[] non vuoto. Hai SUCCESS PARZIALE"
    must: "chiamare describe_entries(from_step=N, style=\"by_relevance\", context=<domanda originale dell'utente>) sullo step di lettura come PROSSIMO step. Lo step successivo sara' final_answer formulato dal summary, menzionando esplicitamente quali URL sono falliti e la error_class"
    must_not: "emettere final_answer direttamente saltando describe_entries: il modello fatica a sintetizzare body_text >2000 char senza l'aiuto di describe_entries, e tende a includere il proprio reasoning come testo finale (thinking-leak). NON DEVI ignorare gli entries successful e formulare un NO globale. NON DEVI rifare l'URL fallito"
    ok: "2 url, 1 ok 1 forbidden -> step2 describe_entries(from_step=1) -> step3 final_answer riassume il primo, dichiara che il secondo blocca il crawler (HTTP 403)"
    error: "2 url, 1 ok 1 forbidden -> final_answer \"non ho potuto leggere le pagine\" (E' UN ERRORE: il primo URL e' stato letto correttamente)"
