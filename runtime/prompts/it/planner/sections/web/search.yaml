# Frontmatter equivalente a `{# --- ... --- #}` Jinja (the design guide §6.1).
role: planner
tier: middle
lang: it
style: prescriptive
version: 1
owner: roberto
updated: 2026-05-13
sha_prev: ""

section:
  name: web_search
  header: "WEB / RICERCA SU SITO (find_urls discovery)"
  preamble: |
    RICERCA-SU-SITO — distinzione INTENTO
    -> find_urls e' il PRIMO step per query web/istituzionali; modalita' default vs deep_search a seconda dell'intento.

rules:
  - name: web_query_routing
    when: "la query menziona siti web (.it/.com/.org/.edu/.gov), domini, «il sito di X», «su <istituzione>», istituzioni pubbliche/private (USR, MIUR, INPS, scuola, comune, regione, ASL, ministero, provveditorato, ambito), o cose di cui non hai file locali noti («notizie su X», «informazioni su Y», «trova organico/bandi/circolari/graduatorie»)"
    must: "usa find_urls come PRIMO step"
    must_not: "usare find_texts per query web: find_texts cerca DENTRO file gia' noti (lista paths), NON sul web"
    ok: "«cerca su web il file dell'organico di diritto scuola primaria Roma» -> find_urls(search_query=\"organico di diritto scuola primaria Roma\", mode=\"default\")"
    error: "«cerca organico scuola Roma» -> find_texts(pattern=\"organico\") (E' UN ERRORE: find_texts e' filesystem)"

  - name: search_no_domain
    when: "l'utente NON nomina un sito/dominio specifico («cerca su web X», «trova X», «cerca X su Internet», «informazioni su Y»)"
    must: "usare search_query=<query naturale> SENZA seed_urls. SearXNG genera candidati + LLM re-rank (Gemma) sceglie i domini istituzionali piu' rilevanti automaticamente. Concretamente: seed_urls e' OMESSO, search_query riceve la query utente parafrasata in keyword istituzionali"
    must_not: "indovinare il dominio: indovinare fallisce spesso (l'utente non l'ha citato -> non lo conosci); la BFS sul home del seed restituisce 0 entries se il PDF e' sepolto in profondita'"
    ok: "«cerca su web il file dell'organico di diritto scuola primaria Roma» -> find_urls(search_query=\"organico di diritto scuola primaria Roma\", mode=\"default\")"
    error: "stesso prompt -> find_urls(seed_urls=[\"https://www.usr.lazio.it/\"]) (E' UN ERRORE: dominio inventato)"

  - name: search_explicit_domain
    when: "l'utente nomina un sito specifico («cerca su www.X.it ...», «sul sito X trova ...»)"
    must: "usare seed_urls=[<URL>] con quel dominio + topic=[<termini>]"
    must_not: "invocare find_urls con seed generico inventato. Se l'utente ha NOMINATO il sito, usa quello. Se NON l'ha nominato, vai su search_no_domain"
    ok: "«cerca su www.atpromaistruzione.it il file organico» -> find_urls(seed_urls=[\"https://www.atpromaistruzione.it/\"], topic=[\"organico\",\"scuola\",\"primaria\"], mode=\"deep_search\")"
    error: "«cerca su usr.lazio.it organico» -> find_urls(search_query=\"organico\") senza seed_urls (E' UN ERRORE: utente ha NOMINATO il sito, va usato)"

  - name: search_zero_results
    when: "find_urls ritorna ok=false con error_class=\"search_no_results\" (motore SearXNG senza match per la query, 10/5/2026)"
    must: "formulare final_answer ONESTO con i criteri della query (cosa cercavi, dove, quando) e suggerire all'utente di fornire un dettaglio piu' specifico (sito, ente, formato file)"
    must_not: "rifare find_urls con la stessa search_query (= DUPLICATE_CALL), ne' rilanciare con sinonimi banali (= rumore)"
    ok: "step1 find_urls(search_query=\"X\") -> error_class=search_no_results -> step2 final_answer \"Niente sul motore di ricerca per <X>. Suggerimento: prova con dettaglio (sito ufficiale, anno).\""
    error: "rilanciare find_urls con la stessa query, o cambiando solo lievemente i token (E' UN ERRORE: DUPLICATE_CALL)"

  - name: discovery_mode
    when: "(A) DISCOVERY mode: «cosa c'e' sul sito X?» / «elenca articoli/pagine su X» / «esplora il blog Y» / «che sezioni ha questo sito?». L'utente NON ha un target specifico, vuole una panoramica del SITO (non di una pagina). Il dominio e' indicato senza path specifico"
    must: "find_urls(seed_urls=[<sito>], topic=<opzionale>) — default mode. Output: entries con titoli+snippet, ordinabili per topic. Body NON letto"
    must_not: "usare mode=\"deep_search\" su panoramica: letture body inutili, query rallentata, l'utente non voleva un'informazione puntuale"
    ok: "«elenca articoli economia su repubblica.it» -> find_urls(seed_urls=[\"https://repubblica.it/\"], topic=\"economia\")"
    error: "stessa query con mode=\"deep_search\" (E' UN ERRORE: body inutile letto)"

  - name: targeted_search
    when: "«trova X su Y» / «qual e' il numero/dato X su Y» / «cerca il PDF/documento X su Y» / «quanto e' Z secondo il sito Y». L'utente ha un target chiaro (numero, nome, decisione, documento) ma NON ha indicato l'URL preciso, solo il dominio"
    must: "find_urls(seed_urls=[<sito>], topic=[<termini>], mode=\"deep_search\"). Output: top-K entries con content_snippet + content_score + hit_terms. Una sola call: il body dei top-K e' gia' letto, niente bisogno di chiamare read_urls_pdf in step separato"
    must_not: "usare mode=\"default\" su targeted search: solo metadata, l'informazione resta nel PDF non letto"
    ok: "«trova i numeri dell'organico su scuola.edu.it» -> find_urls(seed_urls=[\"...\"], topic=[\"organico\",\"personale\"], mode=\"deep_search\") -> final_answer con entries[0].content_snippet"
    error: "stessa query con mode=\"default\" (E' UN ERRORE: solo metadata)"
    disambiguation: "URL specifico (path) -> read_urls_html (vedi web/crawl). Solo dominio + panoramica -> discovery_mode (default). Solo dominio + dato specifico -> targeted_search (deep_search)"
