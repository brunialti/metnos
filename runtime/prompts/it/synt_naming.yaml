# Synt YAML schema (13/5/2026 sera, Asse B extension to synt).
# Stage 1 NAMING: output JSON strutturato {name, action, object, qualifier,
# revertible, critical, target_kind}. Stile `definitional` per §6.1 (no DEVI/
# NON DEVI: lookup nel vocabolario chiuso + few-shot esempi).
section:
  name: synt_naming
  header: "Stage 1 NAMING + CLASSIFICATION di synt-multistage"
  preamble: |
    OUTPUT OBBLIGATORIO: un solo oggetto JSON. NIENTE prosa, NIENTE markdown
    fences, NIENTE commenti. La risposta DEVE iniziare con `{` e finire con `}`.

    NAMING CONVENTION STRINGENTE — il name del nuovo executor segue lo schema:
      {azione}_{oggetto}[_{qualifier}]

vocabulary:
  actions_count: "{{ n_actions }}"
  actions_block: "{{ action_categories_block }}"
  mapping_block: "{{ action_mapping_block }}"
  objects_count: "{{ n_objects }}"
  objects_inline: "{{ objects_inline }}"
  qualifiers_inline: "{{ qualifiers_inline }}"

output_schema:
  type: object
  required: [name, action, object, revertible, critical, target_kind]
  properties:
    name:
      type: string
      pattern: "^[a-z]+_[a-z]+(?:_[a-z][a-z0-9_]*)?$"
      nullable: true
    action:
      type: string
      enum_ref: vocabulary.actions
    object:
      type: string
      enum_ref: vocabulary.objects
    qualifier:
      type: string
      nullable: true
    revertible:
      type: boolean
      rule_move_create: "move, create → true (default: swap_src_dst / delete_created_*)"
      rule_delete_write: "delete, write con overwrite → revertible=true SOLO SE intent menziona snapshot/backup/blob (restore_blob_backup); altrimenti false"
      rule_send: "send → SEMPRE false (side-effect remoto)"
      rule_readonly: "read/find/list/get/describe/filter/fetch/compute → false"
    critical:
      type: boolean
      true_when: "modifica filesystem / rete / stato esterno"
      false_when: "pure compute o sola lettura"
    target_kind:
      type: string
      enum: [path_glob, host, exact, none]
  no_match_fallback:
    name: null
    reason_no_name: "<spiegazione concreta>"

examples:
  - user: "calcola la deviazione standard di una lista di numeri"
    output: {name: "describe_numbers", action: "describe", object: "numbers", qualifier: null, revertible: false, critical: false, target_kind: "none"}
  - user: "comprimi /tmp/log.txt con gzip"
    output: {name: "compress_files_gz", action: "compress", object: "files", qualifier: "gz", revertible: false, critical: true, target_kind: "path_glob"}
  - user: "fai diff tra /tmp/a.txt e /tmp/b.txt"
    output: {name: "compare_files", action: "compare", object: "files", qualifier: null, revertible: false, critical: false, target_kind: "path_glob"}
  - user: "estrai testo da /tmp/page.html togliendo i tag"
    output: {name: "extract_files_html", action: "extract", object: "files", qualifier: "html", revertible: false, critical: false, target_kind: "path_glob"}
  - user: "extract frames from /tmp/clip.mp4 at 1 fps"
    output: {name: "extract_files_video", action: "extract", object: "files", qualifier: "video", revertible: false, critical: true, target_kind: "path_glob"}
  - user: "apply regex foo->bar in /tmp/code.py"
    output: {name: "filter_texts_lines", action: "filter", object: "texts", qualifier: "lines", revertible: false, critical: true, target_kind: "path_glob"}
  - user: "controlla se ffmpeg e' installato"
    note: "verifica esistenza -> find sussume"
    output: {name: "find_packages", action: "find", object: "packages", qualifier: null, revertible: false, critical: false, target_kind: "exact"}
  - user: "ridimensiona immagine a 800x600"
    note: "resize NON nel vocab"
    output: {name: null, reason_no_name: "L'azione 'resize' non e' nel vocabolario chiuso (compress/extract/render coprono altri scope). Escalation a Roberto per estendere il vocab o per usare un tool esterno."}

qualifier_empty:
  adr: "0127"
  desc: |
    QUALIFIER `_empty` cross-domain — famiglia modalita'-operazione.
    Quando la richiesta utente identifica entita' del dominio in stato VUOTO/
    SOTTO-SOGLIA/DISPONIBILE (slot liberi del calendario, file piccoli, cartelle
    vuote, messaggi corti, ecc.), DEVI usare il qualifier `_empty`. Arg canonical:
    `size` (str unit-aware: "1hour"/"10KB"/"100chars"/...). Una sola semantica
    cross-domain, niente analogie forzate fra dominii.
  examples:
    - user: "trova slot liberi di un'ora la prossima settimana"
      output: {name: "find_events_empty", action: "find", object: "events", qualifier: "empty", revertible: false, critical: false, target_kind: "none"}
    - user: "trova i file vuoti sotto /tmp"
      output: {name: "find_files_empty", action: "find", object: "files", qualifier: "empty", revertible: false, critical: false, target_kind: "path_glob"}
    - user: "elenca le cartelle vuote in /opt"
      output: {name: "find_dirs_empty", action: "find", object: "dirs", qualifier: "empty", revertible: false, critical: false, target_kind: "path_glob"}

footer:
  instruction: "ORA produci il JSON per la richiesta utente. SOLO JSON, niente altro."
