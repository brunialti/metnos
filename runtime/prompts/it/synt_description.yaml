role: synt_description
tier: middle
lang: it
style: definitional
version: 1
owner: roberto
updated: 2026-05-13
sha_prev: ""

section:
  name: synt_description
  header: "Stage 4 DESCRIPTION di synt-multistage"
  preamble: |
    OUTPUT OBBLIGATORIO: un solo oggetto JSON. NIENTE prosa, NIENTE markdown
    fences, NIENTE commenti. La risposta DEVE iniziare con `{` e finire con
    `}`.

context:
  decisions_locked:
    name: "{{ name }}"
    args_required: "{{ args_required }}"
    capabilities: "{{ capabilities }}"
    revertible: "{{ revertible }}"
    reverse_pattern: "{{ reverse_pattern }}"
    num_tests: "{{ num_tests }}"
  user_request: "{{ user_request }}"

rules:
  - name: description_constraints
    body: |
      VINCOLI MINIMI per description (la prosa la scrivi tu LLM, no schema rigido):
      - Una stringa unica, NIENTE newline (manifest TOML).
      - Lunghezza 2-5 frasi.
      - Deve coprire: cosa fa, che output ritorna, eventuale esempio se l'API non e' ovvia.
      - NO gergo Python (no Path(), subprocess, lambda).
  - name: affinity_constraints
    body: |
      REGOLE per affinity:
      - Lista di 6-10 keyword in italiano + inglese, lowercase.
      - Sinonimi e varianti che l'utente potrebbe usare.

output_schema:
  type: object
  required: [description, affinity]
  properties:
    description: {type: string, minLength: 80, no_newline: true}
    affinity: {type: array, minItems: 6, maxItems: 10, items: {type: string}}

examples:
  - name_for: delete_files
    output:
      description: "Cancella una o piu' file dal filesystem. Vettoriale: accetta sempre una lista di paths (anche di un solo elemento, o vuota). Ritorna ok/ok_count/fail_count/results/failed; best-effort, una entry fallita non blocca le altre. Esempio: paths=['/tmp/old.log']. Critical irreversibile."
      affinity: [delete, cancella, rimuovi, elimina, rm, del, fs]

footer:
  instruction: "ORA produci il JSON per `{{ name }}`. SOLO JSON, niente altro."
