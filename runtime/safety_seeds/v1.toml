# Metnos safety signatures — seed v1
# ===================================
#
# Initial whitelist + blacklist for the `admin → sudoer` chain (ADR 0070,
# 0071). Bootstrap is idempotent: the loader applies this file only if the
# DB seed_version is < 1, and it never overwrites entries with source='user'.
#
# Signature format: `binary:subcommand_or_flag:target_kind`.
#   target_kind ∈ {*, fs:user, fs:system, fs:tmp, fs:root, unit, pkg,
#                  block_device, network_iface, process_pid, url, literal}.
#
# Severity ∈ {forbidden, irreversible, dangerous, reversible}.
#   forbidden     — Law 1 territory, never derogable, even by user vote.
#   irreversible  — destructive, irreversible at OS level (rm, dd, mkfs).
#   dangerous     — reversible but with broad blast radius (iptables, init).
#   reversible    — side effect bounded, undo possible (restart, install).
#
# Kind ∈ {whitelist, blacklist, graylist, forbidden}.
#   whitelist  — silent execution authorised.
#   blacklist  — silent rejection.
#   graylist   — first execution asks user; subsequent silent within TTL.
#   forbidden  — Law 1 enforcement; user cannot derogate.
#
# Maintenance: bump `version` when adding/changing entries; the bootstrap
# will apply only the new/changed entries to existing DBs.

version = 3


# ─────────────────────────────────────────────────────────────────────
#  WHITELIST — read-only / informational commands (no side effects)
# ─────────────────────────────────────────────────────────────────────

