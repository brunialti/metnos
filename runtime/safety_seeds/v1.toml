# ── Remote share mount (CIFS/SMB/NFS) — ADR 0087, 4/5/2026 ──────────
#
# Pattern: l'utente chiede da chat «monta lo share \\host\Public\Images»;
# il pianificatore traduce in `mount -t cifs //host/Public/Images <dst>
# -o credentials=$TEMPCREDS,uid=1000`. Il pre-step in `cifs_helper` crea
# un file 0600 a vita brevissima con username/password/domain cifrati
# (riusa `runtime/credentials.py`, ADR 0082) e lo distrugge dopo l'exec.
